<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>토지정보 조회 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;
      --border:#30363d;--accent:#58a6ff;--accent2:#3fb950;
      --accent3:#f0883e;--text:#e6edf3;--text2:#8b949e;
      --text3:#484f58;--danger:#f85149;
      --shadow:0 8px 32px rgba(0,0,0,.5);--radius:10px;
    }
    html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent}
    .app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:380px 1fr;height:100vh}
    header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:10}
    .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .spacer{flex:1}
    .hint-text{font-size:12px;color:var(--text3)}
    .panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .panel-section{padding:16px;border-bottom:1px solid var(--border)}
    .section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
    .search-wrap{display:flex;flex-direction:column;gap:8px}
    .input-row{display:flex;gap:6px}
    .input-field{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    .input-field:focus{border-color:var(--accent)}
    .input-field::placeholder{color:var(--text3)}
    .btn{padding:9px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--accent);color:#0d1117}
    .btn-primary:hover{background:#79b8ff;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .quick-btns{display:flex;gap:6px;flex-wrap:wrap}
    .quick-btn{font-size:11px;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;transition:all .15s}
    .quick-btn:hover{border-color:var(--accent);color:var(--accent)}
    .result-label{padding:12px 16px 4px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
    .result-scroll{flex:1;overflow-y:auto;padding:8px 12px 12px;display:flex;flex-direction:column;gap:8px}
    .result-scroll::-webkit-scrollbar{width:4px}
    .result-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);text-align:center}
    .empty-state .icon{font-size:40px;opacity:.3}
    .empty-state p{font-size:13px;line-height:1.7}
    .info-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .info-card-header{padding:12px 14px;background:rgba(88,166,255,.06);border-bottom:1px solid var(--border)}
    .info-card-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.5}
    .info-card-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace}
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border)}
    .kpi-item{padding:12px 10px;display:flex;flex-direction:column;gap:3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
    .kpi-item:nth-child(3n){border-right:none}
    .kpi-item:nth-last-child(-n+3){border-bottom:none}
    .kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
    .kpi-val-area{font-size:20px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent2);line-height:1}
    .kpi-val-unit{font-size:10px;color:var(--text2);margin-top:2px}
    .kpi-val-text{font-size:13px;font-weight:600;color:var(--accent);font-family:'Noto Sans KR',sans-serif;line-height:1.3}
    .kpi-val-warn{font-size:12px;font-weight:600;color:var(--accent3);font-family:'Noto Sans KR',sans-serif;line-height:1.3}
    .kpi-val-owner{font-size:13px;font-weight:600;color:var(--text);font-family:'Noto Sans KR',sans-serif}
    .kpi-val-year{font-size:20px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent3);line-height:1}
    .info-table{padding:2px 0}
    .info-row{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);gap:10px}
    .info-row:last-child{border-bottom:none}
    .info-key{font-size:11px;color:var(--text2);min-width:68px;flex-shrink:0}
    .info-val{font-size:12px;color:var(--text);font-weight:500;flex:1;text-align:right;word-break:break-all;font-family:'JetBrains Mono',monospace}
    .info-val.normal{font-family:'Noto Sans KR',sans-serif}
    .status-bar{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);min-height:36px}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .status-dot.loading{background:var(--accent3);animation:pulse 1s infinite}
    .status-dot.ok{background:var(--accent2)}
    .status-dot.err{background:var(--danger)}
    .map-wrap{position:relative;overflow:hidden}
    #map{width:100%;height:100%;background:#1a1f2e;cursor:crosshair}
    .map-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(13,17,23,.88);border:1px solid var(--border);border-radius:20px;padding:7px 18px;font-size:12px;color:var(--text2);pointer-events:none;backdrop-filter:blur(8px);white-space:nowrap;transition:opacity .4s}
    .map-hint.hide{opacity:0}
    .leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--accent)!important;border-radius:var(--radius)!important;box-shadow:var(--shadow)!important;font-family:'Noto Sans KR',sans-serif!important}
    .leaflet-popup-tip{background:var(--surface)!important}
    .leaflet-popup-content{margin:0!important;padding:0!important;min-width:230px}
    .popup-head{padding:10px 14px;background:rgba(88,166,255,.08);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--accent)}
    .popup-body{padding:4px 0}
    .popup-row{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;font-size:12px;border-bottom:1px solid var(--border)}
    .popup-row:last-child{border-bottom:none}
    .popup-k{color:var(--text2);flex-shrink:0}
    .popup-v{font-weight:600;color:var(--text);text-align:right;font-family:'JetBrains Mono',monospace}
    .popup-v.area{color:var(--accent2);font-size:15px}
    .popup-v.tp{color:var(--accent3);font-family:'Noto Sans KR',sans-serif}
    .popup-v.year{color:var(--accent3)}
    .leaflet-bar a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important}
    .leaflet-bar a:hover{background:var(--surface2)!important}
    .leaflet-control-layers{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:var(--radius)!important;color:var(--text)!important}
    .leaflet-control-attribution{background:rgba(13,17,23,.7)!important;color:var(--text3)!important}
    .leaflet-control-attribution a{color:var(--accent)!important}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .click-ripple{position:absolute;width:44px;height:44px;border-radius:50%;border:2px solid var(--accent);transform:translate(-50%,-50%) scale(0);animation:ripple .65s ease-out forwards;pointer-events:none;z-index:2000}
    @keyframes ripple{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}}

    /* 모바일 */
    .mobile-only{display:none}
    @media(max-width:767px){
      .panel{display:none}.hint-text{display:none}
      .app{grid-template-columns:1fr;grid-template-rows:52px 1fr;height:100vh;height:100dvh}
      .map-wrap{grid-column:1;grid-row:2}
      .map-hint{bottom:80px;font-size:11px;padding:6px 14px}
      .mobile-only{display:flex}
      .m-search{position:absolute;top:calc(52px + 8px);left:10px;right:10px;z-index:500;gap:6px;align-items:center}
      .m-search input{flex:1;background:rgba(22,27,34,.95);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;-webkit-appearance:none;box-shadow:var(--shadow)}
      .m-search input:focus{border-color:var(--accent)}
      .m-search input::placeholder{color:var(--text3)}
      .m-search .btn{flex-shrink:0;padding:10px 14px;box-shadow:var(--shadow)}
      .m-quick{position:absolute;top:calc(52px + 56px);left:10px;right:10px;z-index:500;gap:6px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
      .m-quick::-webkit-scrollbar{display:none}
      .m-quick .quick-btn{flex-shrink:0;background:rgba(22,27,34,.92);border-color:rgba(255,255,255,.1);box-shadow:0 2px 8px rgba(0,0,0,.4);font-size:12px;padding:5px 10px}
      .m-panel{flex-direction:column;position:absolute;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.6);max-height:72vh;transition:transform .3s cubic-bezier(.4,0,.2,1)}
      .m-panel.closed{transform:translateY(calc(100% - 60px))}
      .m-panel.open{transform:translateY(0)}
      .m-handle{flex-direction:column;align-items:center;padding:10px 14px 6px;cursor:pointer;flex-shrink:0;user-select:none;-webkit-user-select:none;gap:6px}
      .m-bar{width:36px;height:4px;background:var(--border);border-radius:2px}
      .m-summary{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px}
      .m-sum-addr{font-size:12px;font-weight:500;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .m-sum-area{font-size:15px;font-weight:700;color:var(--accent2);font-family:'JetBrains Mono',monospace;flex-shrink:0}
      .m-sum-empty{font-size:12px;color:var(--text3)}
      .m-status{display:flex;align-items:center;gap:6px;padding:4px 14px 8px;font-size:11px;color:var(--text3);flex-shrink:0}
      .m-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 10px 24px;display:flex;flex-direction:column;gap:8px}
      .kpi-val-area{font-size:16px}.kpi-val-year{font-size:16px}
      .kpi-item{padding:10px 8px}
    }
  </style>
</head>
<body>
<div class="app">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var API_KEY  = '4E0AD412-BC5D-3976-8220-FD7C550431CE';
var BLD_KEY  = '262UaaKgpdsminV6qlnLGdOq7KpFfEfTPk9jPZwt422PFHtMoAKfWyF3k3DFQWNUpVmdLpZw4ESve6h7hkw4uA==';
var GEO_URL  = 'https://api.vworld.kr/req/address';
var LAND_URL = 'https://api.vworld.kr/ned/data/ladfrlList';
var BLD_BASE = 'https://apis.data.go.kr/1613000/BldRgstHubService/';
var THIS_YEAR = new Date().getFullYear();
var cbIdx = 0, currentMarker = null;
var isMobile = function(){ return window.innerWidth <= 767; };

/* ── 모바일 패널 ── */
var panelOpen = false;
document.getElementById('mHandle').addEventListener('click', function(){ togglePanel(!panelOpen); });
var touchStartY = null;
document.getElementById('mHandle').addEventListener('touchstart', function(e){ touchStartY = e.touches[0].clientY; },{passive:true});
document.addEventListener('touchmove', function(e){
  if(touchStartY===null) return;
  var dy = e.touches[0].clientY - touchStartY;
  if(dy<-30){togglePanel(true);touchStartY=null;}
  else if(dy>30){togglePanel(false);touchStartY=null;}
},{passive:true});
document.addEventListener('touchend',function(){touchStartY=null;});
function togglePanel(open){
  panelOpen=open;
  document.getElementById('mPanel').classList.toggle('open',open);
  document.getElementById('mPanel').classList.toggle('closed',!open);
}

/* ── JSONP ── */
function jsonp(url, params) {
  return new Promise(function(resolve, reject) {
    var cbName = '__cb'+(cbIdx++);
    params.callback = cbName;
    var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
    var timer = setTimeout(function(){ cleanup(); reject(new Error('요청 시간 초과')); }, 10000);
    window[cbName] = function(d){ cleanup(); resolve(d); };
    var s = document.createElement('script');
    s.src = url+'?'+qs;
    s.onerror = function(){ cleanup(); reject(new Error('연결 실패')); };
    document.head.appendChild(s);
    function cleanup(){ clearTimeout(timer); delete window[cbName]; if(s.parentNode) s.parentNode.removeChild(s); }
  });
}

/* ══════════════════════════════════════════════
   buildPNU — 핵심 수정 포인트

   지오코더 level4LC 유형:
   A) 10자리 법정동코드  → buildPNU로 19자리 조합
   B) 19자리 완성 PNU   → 그대로 사용 (역삼동 676 같은 케이스)
   C) 빈 문자열         → '' 반환
══════════════════════════════════════════════ */
function buildPNU(level4LC, level5) {
  if (!level4LC) return '';

  // ★ 수정 1: 이미 19자리 완성 PNU면 그대로 반환
  if (level4LC.length === 19) return level4LC;

  // 10자리 미만이면 조합 불가
  if (level4LC.length < 10) return '';

  var jibun  = String(level5 || '').trim();
  var san    = jibun.indexOf('산') >= 0 ? '2' : '1';
  var clean  = jibun.replace(/[^0-9\-]/g, '');
  var parts  = clean.split('-');
  var bonbun = parts[0] ? String(parseInt(parts[0], 10)) : '0';
  var bubun  = parts[1] ? String(parseInt(parts[1], 10)) : '0';
  function pad4(s){ return ('0000'+s).slice(-4); }
  var pnu = level4LC + san + pad4(bonbun) + pad4(bubun);
  console.log('PNU 조합:', level4LC, '| level5:', level5, '→', pnu);
  return pnu;
}

/* ── 응답 파싱 ── */
function parseLandResponse(data) {
  if (data && data.ladfrlVOList && data.ladfrlVOList.ladfrlVOList) {
    var list = data.ladfrlVOList.ladfrlVOList;
    return Array.isArray(list) ? list : [list];
  }
  if (data && data.ladfrlList && data.ladfrlList.field) {
    var f = data.ladfrlList.field;
    return Array.isArray(f) ? f : [f];
  }
  return null;
}
function normalizeField(f) {
  return {
    addr:   f.ldCodeNm       || '-',
    jibun:  f.mnnmSlno       || '-',
    area:   f.lndpclAr       || '-',
    type:   f.lndcgrCodeNm   || '-',
    owner:  f.posesnSeCodeNm || '-',
    pnu:    f.pnu            || '-',
    date:   f.lastUpdtDt     || '-',
    regstr: f.regstrSeCodeNm || '-',
    scan:   f.ladFrtlScNm    || '-'
  };
}

/* ── PNU → 건축물대장 파라미터 추출 ── */
function pnuToParams(pnu) {
  if (!pnu || pnu.length !== 19) return null;
  return {
    sigunguCd: pnu.substring(0, 5),
    bjdongCd:  pnu.substring(5, 10),
    platGbCd:  pnu.substring(10, 11) === '2' ? '1' : '0',
    bun:       pnu.substring(11, 15),
    ji:        pnu.substring(15, 19)
  };
}

/* ══════════════════════════════════════════════
   fetchBldInfo — 핵심 수정 포인트

   시도 순서:
   1) getBrTitleInfo       — 표제부
   2) getBrRecapTitleInfo  — 총괄표제부
   3) getBrExposPubuseAreaInfo — 전유/공용면적
   4) getBrExposInfo       — 전유부
   5) getBrBasisOulnInfo   — 기본개요 (연도 없을 수 있어 최후순위)
══════════════════════════════════════════════ */
async function fetchBldInfo(pnu) {
  var p = pnuToParams(pnu);
  if (!p) return null;

  var baseQs = 'serviceKey=' + encodeURIComponent(BLD_KEY)
    + '&sigunguCd=' + p.sigunguCd
    + '&bjdongCd='  + p.bjdongCd
    + '&platGbCd='  + p.platGbCd
    + '&bun='       + p.bun
    + '&ji='        + p.ji
    + '&numOfRows=100&pageNo=1&_type=json';

  // 공통 fetch + 파싱 헬퍼
  async function tryApi(endpoint) {
    try {
      var res  = await fetch(BLD_BASE + endpoint + '?' + baseQs);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      var items = data.response && data.response.body && data.response.body.items;
      if (!items || !items.item) return null;
      var list = Array.isArray(items.item) ? items.item : [items.item];
      return list.length ? list : null;
    } catch(e) { console.warn(endpoint + ' 실패:', e.message); return null; }
  }

  function chooseBestItem(items) {
    if (!items || !items.length) return null;

    var withYear = items
      .map(function(item){
        var year = parseYear(item.useAprDay);
        return year ? { item: item, sortKey: String(item.useAprDay).replace(/\D/g, '') } : null;
      })
      .filter(Boolean)
      .sort(function(a, b){
        return b.sortKey.localeCompare(a.sortKey);
      });

    if (withYear.length) return withYear[0].item;
    return items[0];
  }

  var fallbackItem = null;

  async function pickFrom(endpoint) {
    var list = await tryApi(endpoint);
    if (!list || !list.length) return null;

    var picked = chooseBestItem(list);
    if (!fallbackItem && picked) fallbackItem = picked;

    if (picked && parseYear(picked.useAprDay)) {
      console.log('✅ ' + endpoint + ' 성공 (준공연도 포함)');
      return picked;
    }

    console.log('ℹ️ ' + endpoint + ' 응답은 있으나 준공연도 없음');
    return null;
  }

  // 1차: 일반건축물 표제부
  var item = await pickFrom('getBrTitleInfo');
  if (item) return item;

  // 2차: 총괄표제부
  item = await pickFrom('getBrRecapTitleInfo');
  if (item) return item;

  // 3차: 전유/공용면적
  item = await pickFrom('getBrExposPubuseAreaInfo');
  if (item) return item;

  // 4차: 전유부
  item = await pickFrom('getBrExposInfo');
  if (item) return item;

  // 5차: 기본개요는 다른 보조 정보용 fallback
  var basisList = await tryApi('getBrBasisOulnInfo');
  if (basisList && basisList.length) {
    console.log('ℹ️ getBrBasisOulnInfo만 조회됨');
    return chooseBestItem(basisList);
  }

  console.warn('❌ 모든 건축물대장 API 실패 (pnu:', pnu, ')');
  return fallbackItem;
}

/* ── 준공연도 파싱 ── */
function parseYear(useAprDay) {
  if (!useAprDay || useAprDay.trim() === '') return null;
  var s = useAprDay.trim().replace(/\D/g, '');
  return s.length >= 4 ? s.substring(0, 4) : null;
}

map.on('click', function(e){
  showRipple(e.originalEvent.clientX, e.originalEvent.clientY);
  document.getElementById('mapHint').classList.add('hide');
  if(isMobile()) togglePanel(false);
  clickAndFetch(e.latlng.lng, e.latlng.lat);
});
function showRipple(x,y){
  var wrap=document.getElementById('mapWrap'), rect=wrap.getBoundingClientRect();
  var el=document.createElement('div'); el.className='click-ripple';
  el.style.left=(x-rect.left)+'px'; el.style.top=(y-rect.top)+'px';
  wrap.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},700);
}

/* ── 클릭 → 역지오코딩 → PNU → 조회 ── */
async function clickAndFetch(lon, lat) {
  setStatus('위치 분석 중...','loading');
  var addr='', pnu='';
  try {
    var gd = await jsonp(GEO_URL,{
      service:'address',request:'getAddress',key:API_KEY,
      point:lon+','+lat,type:'PARCEL',format:'json',errorFormat:'json'
    });
    if(gd.response && gd.response.status==='OK'){
      var r = Array.isArray(gd.response.result) ? gd.response.result[0] : gd.response.result;
      if(r && r.structure){
        addr = r.text || '';
        pnu  = buildPNU(r.structure.level4LC||'', r.structure.level5||'');
      }
    }
  } catch(e){ console.warn('역지오코딩:', e); }
  if(addr) document.getElementById('addrInput').value = addr;
  setStatus('토지 및 건축물 정보 조회 중...','loading');
  await fetchAllInfo(lon, lat, pnu, addr);
}

/* ── 주소 검색 ── */
async function searchAddress(){
  var addr=document.getElementById('addrInput').value.trim();
  if(!addr) return;
  await doSearch(addr, document.getElementById('searchBtn'));
}
async function mobileSearch(){
  var addr=document.getElementById('mAddrInput').value.trim();
  if(!addr) return;
  document.getElementById('addrInput').value=addr;
  await doSearch(addr, document.getElementById('mSearchBtn'));
}
async function doSearch(addr, btn){
  setStatus('주소 변환 중...','loading');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';}
  try {
    var data = await jsonp(GEO_URL,{
      service:'address',request:'getcoord',key:API_KEY,
      address:addr,type:'PARCEL',format:'json',errorFormat:'json',verbose:'true'
    });
    if(!data.response || data.response.status!=='OK'){
      setStatus('주소를 찾을 수 없습니다','err'); return;
    }
    var pt=data.response.result.point;
    var lon=parseFloat(pt.x), lat=parseFloat(pt.y);
    var pnu='';
    if(data.response.refined && data.response.refined.structure){
      var st=data.response.refined.structure;
      pnu=buildPNU(st.level4LC||'', st.level5||'');
    }
    document.getElementById('mapHint').classList.add('hide');
    setStatus('토지 및 건축물 정보 조회 중...','loading');
    await fetchAllInfo(lon, lat, pnu, addr);
  } catch(e){ setStatus('오류: '+e.message,'err'); }
  finally{ if(btn){btn.disabled=false;btn.innerHTML='검색';} }
}
function quickSearch(addr){
  document.getElementById('addrInput').value=addr;
  document.getElementById('mAddrInput').value=addr;
  doSearch(addr,null);
}

/* ── 토지임야정보 + 건축물대장 병렬 조회 ── */
async function fetchAllInfo(lon, lat, pnu, addr){
  if(!pnu || pnu.length!==19){
    renderNoData(lon,lat,addr,pnu,'PNU를 생성할 수 없습니다<br><small>건물·도로·강 위는 조회 불가 — 필지(땅) 위를 클릭하세요</small>');
    placeMarkerSimple(lat,lon); map.setView([lat,lon],18); return;
  }
  try {
    var results = await Promise.allSettled([
      jsonp(LAND_URL,{key:API_KEY,domain:'https://cune54-bit.github.io',format:'json',numOfRows:'1',pageNo:'1',pnu:pnu}),
      fetchBldInfo(pnu)
    ]);
    var landData = results[0].status==='fulfilled' ? results[0].value : null;
    var bldItem  = results[1].status==='fulfilled' ? results[1].value : null;
    var fields   = parseLandResponse(landData);

    if(fields && fields.length>0){
      var f = normalizeField(fields[0]);
      var fullAddr = f.addr+(f.jibun!=='-'?' '+f.jibun:'');
      if(addr && addr.length>fullAddr.length) fullAddr=addr;
      var yearStr = bldItem ? parseYear(bldItem.useAprDay) : null;
      var bldInfo = bldItem ? {
        year:    yearStr,
        purpose: bldItem.mainPurpsCdNm || '-',
        floors:  (bldItem.grndFlrCnt?'지상 '+bldItem.grndFlrCnt+'층':'')
                +(bldItem.ugrndFlrCnt&&bldItem.ugrndFlrCnt>0?' / 지하 '+bldItem.ugrndFlrCnt+'층':''),
        struct:  bldItem.strctCdNm || '-',
        area_bld: bldItem.archArea || null,
        area_tot: bldItem.totArea  || null,
        roadAddr: bldItem.newPlatPlc || ''
      } : null;
      renderInfoCard(f, fullAddr, lon, lat, bldInfo);
      placeMarker(lat, lon, f, fullAddr, bldInfo);
      map.setView([lat,lon],18);
      setStatus('조회 완료 ✓','ok');
      if(isMobile()) setTimeout(function(){togglePanel(true);},500);
    } else {
      renderNoData(lon,lat,addr,pnu,'해당 필지 토지정보가 없습니다');
      placeMarkerSimple(lat,lon); map.setView([lat,lon],18);
      if(isMobile()) setTimeout(function(){togglePanel(true);},500);
    }
  } catch(e){
    renderNoData(lon,lat,addr,pnu,'조회 오류: '+e.message);
    placeMarkerSimple(lat,lon); map.setView([lat,lon],18); console.warn(e);
  }
}

/* ── 카드 렌더링 ── */
function makeCardHTML(f, fullAddr, lon, lat, bld){
  var areaNum  = f.area!=='-' ? Number(f.area) : null;
  var areaDisp = areaNum ? areaNum.toLocaleString() : '-';
  var yearDisp = bld && bld.year ? bld.year : '-';
  var ageDisp  = (bld && bld.year) ? (THIS_YEAR - parseInt(bld.year,10))+'년 경과' : '';
  var yearNote = (!bld || !bld.year)
    ? '<span style="font-size:10px;color:var(--text3)">건축물대장 미등재</span>' : '';

  var kpi =
    '<div class="kpi-grid">'
    +'<div class="kpi-item"><span class="kpi-label">대지면적</span>'
    +'<span class="kpi-val-area">'+areaDisp+'</span>'
    +'<span class="kpi-val-unit">㎡</span></div>'
    +'<div class="kpi-item"><span class="kpi-label">지목</span>'
    +'<span class="kpi-val-text">'+f.type+'</span>'
    +'<span class="kpi-val-unit">'+f.regstr+'</span></div>'
    +'<div class="kpi-item"><span class="kpi-label">준공연도</span>'
    +'<span class="kpi-val-year">'+yearDisp+'</span>'
    +'<span class="kpi-val-unit">'+ageDisp+yearNote+'</span></div>'
    +'<div class="kpi-item"><span class="kpi-label">소유구분</span>'
    +'<span class="kpi-val-owner">'+f.owner+'</span>'
    +'<span class="kpi-val-unit">용도지역: <a href="https://eum.go.kr" target="_blank" style="color:var(--accent);text-decoration:none">토지이음</a></span></div>'
    +'</div>';

  var rows='';
  if(bld && bld.purpose!=='-') rows+='<div class="info-row"><span class="info-key">주용도</span><span class="info-val normal">'+bld.purpose+'</span></div>';
  if(bld && bld.floors)        rows+='<div class="info-row"><span class="info-key">층수</span><span class="info-val normal">'+bld.floors+'</span></div>';
  if(bld && bld.struct!=='-')  rows+='<div class="info-row"><span class="info-key">구조</span><span class="info-val normal">'+bld.struct+'</span></div>';
  if(bld && bld.area_bld)      rows+='<div class="info-row"><span class="info-key">건축면적</span><span class="info-val">'+Number(bld.area_bld).toLocaleString()+' ㎡</span></div>';
  if(bld && bld.area_tot)      rows+='<div class="info-row"><span class="info-key">연면적</span><span class="info-val">'+Number(bld.area_tot).toLocaleString()+' ㎡</span></div>';
  if(bld && bld.roadAddr)      rows+='<div class="info-row"><span class="info-key">도로명</span><span class="info-val normal" style="font-size:11px">'+bld.roadAddr+'</span></div>';
  rows+='<div class="info-row"><span class="info-key">토지수정</span><span class="info-val">'+f.date+'</span></div>';
  rows+='<div class="info-row"><span class="info-key">좌표</span><span class="info-val" style="font-size:10px">'+lat.toFixed(6)+', '+lon.toFixed(6)+'</span></div>';

  return '<div class="info-card">'
    +'<div class="info-card-header">'
    +'<div class="info-card-title">📍 '+fullAddr+'</div>'
    +'<div class="info-card-sub">'+f.pnu+'</div>'
    +'</div>'+kpi
    +'<div class="info-table">'+rows+'</div>'
    +'</div>';
}

function renderInfoCard(f, fullAddr, lon, lat, bld){
  var html=makeCardHTML(f,fullAddr,lon,lat,bld);
  document.getElementById('desktopResult').innerHTML=html;
  document.getElementById('mobileResult').innerHTML=html;
  var areaDisp=f.area!=='-'?Number(f.area).toLocaleString()+' ㎡':'';
  var el=document.getElementById('mSummary');
  el.className='m-sum-addr'; el.textContent=fullAddr.split(' ').slice(-3).join(' ');
  document.getElementById('mArea').textContent=areaDisp;
}

function renderNoData(lon,lat,addr,pnu,msg){
  var html='<div class="info-card">'
    +'<div class="info-card-header"><div class="info-card-title">📍 '+(addr||'위치 정보')+'</div>'
    +'<div class="info-card-sub">'+(pnu||'-')+'</div></div>'
    +'<div style="padding:16px 14px;font-size:13px;color:var(--text2);line-height:1.8">'+(msg||'토지 정보 없음')+'</div>'
    +'</div>';
  document.getElementById('desktopResult').innerHTML=html;
  document.getElementById('mobileResult').innerHTML=html;
  var el=document.getElementById('mSummary');
  el.className='m-sum-empty'; el.textContent='정보 없음 — 다른 위치를 탭하세요';
  document.getElementById('mArea').textContent='';
  setStatus('정보 없음','err');
}

/* ── 마커 ── */
function makeIcon(label,color){
  color=color||'#58a6ff';
  var safe=String(label||'').replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="56" height="70" viewBox="0 0 56 70">'
    +'<circle cx="28" cy="24" r="22" fill="'+color+'" opacity=".18"/>'
    +'<circle cx="28" cy="24" r="15" fill="'+color+'"/>'
    +'<circle cx="28" cy="24" r="6" fill="white"/>'
    +'<path d="M28 54 L20 36 Q28 40 36 36 Z" fill="'+color+'"/>'
    +'<text x="28" y="67" text-anchor="middle" font-size="8" font-weight="bold" fill="'+color+'" font-family="sans-serif">'+safe+'</text>'
    +'</svg>';
  return L.divIcon({html:svg,iconSize:[56,70],iconAnchor:[28,66],popupAnchor:[0,-68],className:''});
}
function placeMarker(lat,lon,f,fullAddr,bld){
  if(currentMarker) map.removeLayer(currentMarker);
  var areaDisp=f.area!=='-'?Number(f.area).toLocaleString()+'㎡':'-';
  var yearDisp=bld&&bld.year?bld.year:'-';
  var popup='<div class="popup-head">'+fullAddr.split(' ').slice(-3).join(' ')+'</div>'
    +'<div class="popup-body">'
    +'<div class="popup-row"><span class="popup-k">대지면적</span><span class="popup-v area">'+(f.area!=='-'?Number(f.area).toLocaleString()+' ㎡':'-')+'</span></div>'
    +'<div class="popup-row"><span class="popup-k">지목</span><span class="popup-v tp">'+f.type+'</span></div>'
    +'<div class="popup-row"><span class="popup-k">준공연도</span><span class="popup-v year">'+yearDisp+'</span></div>'
    +'<div class="popup-row"><span class="popup-k">주용도</span><span class="popup-v tp">'+(bld&&bld.purpose?bld.purpose:'-')+'</span></div>'
    +'<div class="popup-row"><span class="popup-k">소유구분</span><span class="popup-v">'+f.owner+'</span></div>'
    +'</div>';
  currentMarker=L.marker([lat,lon],{icon:makeIcon(areaDisp,'#3fb950')})
    .addTo(map).bindPopup(popup,{maxWidth:280}).openPopup();
}
function placeMarkerSimple(lat,lon){
  if(currentMarker) map.removeLayer(currentMarker);
  currentMarker=L.marker([lat,lon],{icon:makeIcon('','#58a6ff')}).addTo(map);
}

/* ── 유틸 ── */
function clearAll(){
  ['addrInput','mAddrInput'].forEach(function(id){document.getElementById(id).value='';});
  var emptyHTML='<div class="empty-state"><div class="icon">🏛️</div><p><strong>지도를 클릭</strong>하면<br>해당 필지의 토지 정보가<br>자동으로 표시됩니다</p></div>';
  document.getElementById('desktopResult').innerHTML=emptyHTML;
  document.getElementById('mobileResult').innerHTML=emptyHTML;
  var el=document.getElementById('mSummary');
  el.className='m-sum-empty'; el.textContent='👆 지도를 탭해 필지를 선택하세요';
  document.getElementById('mArea').textContent='';
  if(currentMarker){map.removeLayer(currentMarker);currentMarker=null;}
  document.getElementById('mapHint').classList.remove('hide');
  if(isMobile()) togglePanel(false);
  setStatus('지도를 클릭해 필지를 선택하세요','');
}
function setStatus(msg,type){
  ['statusDot','mStatusDot'].forEach(function(id){
    document.getElementById(id).className='status-dot'+(type?' '+type:'');
  });
  ['statusMsg','mStatusMsg'].forEach(function(id){
    document.getElementById(id).textContent=msg;
  });
}
document.getElementById('addrInput').addEventListener('keydown',function(e){if(e.key==='Enter')searchAddress();});
document.getElementById('mAddrInput').addEventListener('keydown',function(e){if(e.key==='Enter')mobileSearch();});
