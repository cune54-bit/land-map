<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>토지 대지면적 조회 지도</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;
      --border:#30363d;--accent:#58a6ff;--accent2:#3fb950;
      --accent3:#f0883e;--text:#e6edf3;--text2:#8b949e;
      --text3:#484f58;--danger:#f85149;
      --shadow:0 8px 32px rgba(0,0,0,.4);--radius:10px;
    }
    html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    .app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:360px 1fr;height:100vh}
    header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
    .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .spacer{flex:1}
    .hint{font-size:12px;color:var(--text3)}
    .panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .panel-section{padding:16px;border-bottom:1px solid var(--border)}
    .section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
    .search-wrap{display:flex;flex-direction:column;gap:8px}
    .input-row{display:flex;gap:6px}
    .input-field{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    .input-field:focus{border-color:var(--accent)}
    .input-field::placeholder{color:var(--text3)}
    .btn{padding:9px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--accent);color:#0d1117}
    .btn-primary:hover{background:#79b8ff;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .quick-btns{display:flex;gap:6px;flex-wrap:wrap}
    .quick-btn{font-size:11px;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;transition:all .15s}
    .quick-btn:hover{border-color:var(--accent);color:var(--accent)}
    .result-label{padding:12px 16px 4px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
    .result-scroll{flex:1;overflow-y:auto;padding:8px 12px 12px;display:flex;flex-direction:column;gap:8px}
    .result-scroll::-webkit-scrollbar{width:4px}
    .result-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);text-align:center}
    .empty-state .icon{font-size:36px;opacity:.4}
    .empty-state p{font-size:13px;line-height:1.6}
    .land-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .land-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent2);border-radius:3px 0 0 3px}
    .land-card:hover{border-color:var(--accent);transform:translateX(2px)}
    .land-card.active{border-color:var(--accent);background:rgba(88,166,255,.05)}
    .card-addr{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4}
    .card-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .meta-item{display:flex;flex-direction:column;gap:2px}
    .meta-label{font-size:10px;color:var(--text3);text-transform:uppercase}
    .meta-value{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--accent)}
    .meta-value.area{color:var(--accent2)}
    .meta-value.tp{color:var(--accent3);font-family:'Noto Sans KR',sans-serif;font-size:12px}
    .notice-box{margin-top:8px;background:rgba(240,136,62,.08);border:1px solid rgba(240,136,62,.3);border-radius:8px;padding:8px 10px;font-size:11px;color:var(--accent3);line-height:1.6}
    .status-bar{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);min-height:36px}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .status-dot.loading{background:var(--accent3);animation:pulse 1s infinite}
    .status-dot.ok{background:var(--accent2)}
    .status-dot.err{background:var(--danger)}
    .map-wrap{position:relative;overflow:hidden}
    #map{width:100%;height:100%}
    .map-overlay{position:absolute;top:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;min-width:240px;max-width:290px;box-shadow:var(--shadow);z-index:9999;display:none}
    .map-overlay.visible{display:block}
    .overlay-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px}
    .overlay-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);gap:12px}
    .overlay-row:last-child{border-bottom:none}
    .overlay-key{color:var(--text2);flex-shrink:0}
    .overlay-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text);text-align:right;word-break:break-all}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><span class="dot"></span>토지 대지면적 조회</div>
    <span class="badge">VWorld API 2.0</span>
    <div class="spacer"></div>
    <span class="hint">지번 주소 검색 또는 지도 클릭</span>
  </header>
  <aside class="panel">
    <div class="panel-section">
      <div class="section-label">주소 검색</div>
      <div class="search-wrap">
        <div class="input-row">
          <input class="input-field" id="addrInput" placeholder="예) 경기도 성남시 중원구 성남동 2882" />
        </div>
        <div class="input-row">
          <button class="btn btn-primary" id="searchBtn" onclick="searchAddress()">검색</button>
          <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
        </div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="quickSearch('경기도 성남시 중원구 성남동 2882')">성남동 2882</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 강남구 역삼동 737')">역삼동 737</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 종로구 세종로 1')">세종로 1</button>
        </div>
      </div>
    </div>
    <div class="result-label">조회 결과</div>
    <div class="result-scroll" id="resultList">
      <div class="empty-state"><div class="icon">🗺️</div><p>주소를 검색하면<br>토지 정보가 표시됩니다</p></div>
    </div>
    <div class="status-bar">
      <div class="status-dot loading" id="statusDot"></div>
      <span id="statusMsg">지도 로딩 중...</span>
    </div>
  </aside>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-overlay" id="mapOverlay">
      <div class="overlay-title" id="overlayTitle">토지 정보</div>
      <div id="overlayContent"></div>
    </div>
  </div>
</div>

<script>
var API_KEY  = '4E0AD412-BC5D-3976-8220-FD7C550431CE';
var GEO_URL  = 'https://api.vworld.kr/req/address';
var LAND_URL = 'https://api.vworld.kr/ned/data/ladfrlList';
var map = null, currentMarkers = [], cbIdx = 0;

/* JSONP */
function jsonp(url, params) {
  return new Promise(function(resolve, reject) {
    var cbName = '__cb' + (cbIdx++);
    params.callback = cbName;
    var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
    var timer = setTimeout(function(){ cleanup(); reject(new Error('요청 시간 초과')); }, 10000);
    window[cbName] = function(d){ cleanup(); resolve(d); };
    var s = document.createElement('script');
    s.src = url + '?' + qs;
    s.onerror = function(){ cleanup(); reject(new Error('API 연결 실패')); };
    document.head.appendChild(s);
    function cleanup(){ clearTimeout(timer); delete window[cbName]; if(s.parentNode) s.parentNode.removeChild(s); }
  });
}

/* 지도 초기화 */
function initMap() {
  if (map) return;
  try {
    var opt = new vw.MapOptions(vw.BasemapType.GRAPHIC, 127.1429, 37.4342, 15, null, null);
    map = new vw.Map('map', opt);
    /* 클릭 이벤트 */
    map.on(vw.MapEvent.Type.CLICK, function(e) {
      if (!e) return;
      var lon, lat;
      try {
        if (e.coordinate) {
          var t = ol.proj.transform(e.coordinate, 'EPSG:3857', 'EPSG:4326');
          lon = t[0]; lat = t[1];
        } else if (e.lonlat) { lon = e.lonlat.lon; lat = e.lonlat.lat; }
      } catch(ex) { console.warn(ex); return; }
      if (lon && lat) reverseGeocode(lon, lat);
    });
    setStatus('준비됨', 'ok');
  } catch(e) {
    setStatus('지도 오류: ' + e.message, 'err');
    console.error(e);
  }
}

/* 브이월드 SDK 콜백 */
function vworldLoad() { initMap(); }

/* fallback */
window.addEventListener('load', function() {
  setTimeout(function() { if (typeof vw !== 'undefined' && !map) initMap(); }, 800);
});

/* 주소 검색 */
async function searchAddress() {
  var addr = document.getElementById('addrInput').value.trim();
  if (!addr) { setStatus('주소를 입력해주세요', 'err'); return; }
  setStatus('주소 변환 중...', 'loading'); setSearchBtn(true);
  try {
    var data = await jsonp(GEO_URL, { service:'address', request:'getcoord', key:API_KEY, address:addr, type:'PARCEL', format:'json', errorFormat:'json', verbose:'true' });
    if (!data.response || data.response.status !== 'OK') {
      setStatus('주소를 찾을 수 없습니다', 'err');
      showEmpty('"' + addr + '" 검색 결과 없음'); return;
    }
    var pt  = data.response.result.point;
    var pnu = (data.response.refined && data.response.refined.structure) ? data.response.refined.structure.level4LC : '';
    await fetchLandInfo(parseFloat(pt.x), parseFloat(pt.y), pnu, addr);
  } catch(e) { setStatus('오류: ' + e.message, 'err'); console.error(e); }
  finally { setSearchBtn(false); }
}

/* 역지오코딩 */
async function reverseGeocode(lon, lat) {
  setStatus('클릭 위치 조회 중...', 'loading');
  try {
    var data = await jsonp(GEO_URL, { service:'address', request:'getAddress', key:API_KEY, point:lon+','+lat, type:'PARCEL', format:'json', errorFormat:'json' });
    if (!data.response || data.response.status !== 'OK') { setStatus('주소 없음', 'err'); return; }
    var r = Array.isArray(data.response.result) ? data.response.result[0] : data.response.result;
    if (!r) { setStatus('주소 정보 없음', 'err'); return; }
    var addr = r.text || '';
    var pnu  = (r.structure && r.structure.level4LC) ? r.structure.level4LC : '';
    document.getElementById('addrInput').value = addr;
    await fetchLandInfo(lon, lat, pnu, addr);
  } catch(e) { setStatus('역지오코딩 오류: ' + e.message, 'err'); }
}

/* 토지임야정보 */
async function fetchLandInfo(lon, lat, pnu, addr) {
  var p = { key:API_KEY, domain:'https://cune54-bit.github.io', format:'json', numOfRows:'5', pageNo:'1' };
  if (pnu && pnu.length >= 19) p.pnu = pnu;
  else { p.x = String(lon); p.y = String(lat); p.crs = 'EPSG:4326'; }
  setStatus('토지 정보 조회 중...', 'loading');
  try {
    var data = await jsonp(LAND_URL, p);
    if (data && data.ladfrlList && data.ladfrlList.field) {
      var f = Array.isArray(data.ladfrlList.field) ? data.ladfrlList.field : [data.ladfrlList.field];
      renderCards(f); addMarker(lon, lat, f[0]);
    } else { renderGeoOnly(lon, lat, addr, pnu); addMarkerSimple(lon, lat); }
  } catch(e) { renderGeoOnly(lon, lat, addr, pnu); addMarkerSimple(lon, lat); console.warn(e); }
  moveMap(lon, lat);
}

/* 카드 */
function renderCards(fields) {
  var list = document.getElementById('resultList');
  list.innerHTML = '';
  fields.forEach(function(f, i) {
    var card = document.createElement('div');
    card.className = 'land-card' + (i===0?' active':'');
    card.onclick = function() {
      document.querySelectorAll('.land-card').forEach(function(c,j){ c.classList.toggle('active',j===i); });
      showOverlayField(f);
    };
    var area  = f.lndpclAr   ? (Number(f.lndpclAr).toLocaleString() + ' ㎡') : '-';
    var type  = f.lndcgrCdNm  || '-';
    var zone  = f.prposArea1  || '-';
    var price = f.pblntfPclnd ? (Number(f.pblntfPclnd).toLocaleString() + ' 원/㎡') : '-';
    var addr  = f.lnbrAdres   || '-';
    card.innerHTML = '<div class="card-addr">'+addr+'</div>'
      +'<div class="card-meta">'
      +'<div class="meta-item"><span class="meta-label">대지면적</span><span class="meta-value area">'+area+'</span></div>'
      +'<div class="meta-item"><span class="meta-label">지목</span><span class="meta-value tp">'+type+'</span></div>'
      +'<div class="meta-item"><span class="meta-label">용도지역</span><span class="meta-value tp" style="font-size:11px">'+(zone.length>14?zone.slice(0,14)+'…':zone)+'</span></div>'
      +'<div class="meta-item"><span class="meta-label">공시지가</span><span class="meta-value" style="font-size:11px">'+price+'</span></div>'
      +'</div>';
    list.appendChild(card);
  });
  showOverlayField(fields[0]);
  setStatus(fields.length + '건 조회됨', 'ok');
}

function renderGeoOnly(lon, lat, addr, pnu) {
  var list = document.getElementById('resultList');
  list.innerHTML = '';
  var card = document.createElement('div');
  card.className = 'land-card active';
  card.innerHTML = '<div class="card-addr">'+(addr||'주소 없음')+'</div>'
    +'<div class="card-meta">'
    +'<div class="meta-item"><span class="meta-label">경도</span><span class="meta-value">'+lon.toFixed(5)+'</span></div>'
    +'<div class="meta-item"><span class="meta-label">위도</span><span class="meta-value">'+lat.toFixed(5)+'</span></div>'
    +'<div class="meta-item" style="grid-column:1/-1"><span class="meta-label">PNU</span><span class="meta-value" style="font-size:11px">'+(pnu||'-')+'</span></div>'
    +'</div>'
    +'<div class="notice-box">⚠️ 토지임야정보 API는 vworld.kr에서<br>도메인 등록 후 이용 가능합니다</div>';
  list.appendChild(card);
  showOverlayGeo(lon, lat, addr);
  setStatus('위치 표시됨 (토지 상세 없음)', 'err');
}

function showEmpty(msg) {
  document.getElementById('resultList').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>'+msg+'</p></div>';
}

function showOverlayField(f) {
  var rows = [
    ['대지면적', f.lndpclAr   ? Number(f.lndpclAr).toLocaleString()+' ㎡' : null],
    ['지목',    f.lndcgrCdNm  || null],
    ['용도지역', f.prposArea1  || null],
    ['공시지가', f.pblntfPclnd ? Number(f.pblntfPclnd).toLocaleString()+' 원/㎡' : null],
  ].filter(function(r){ return r[1]; });
  document.getElementById('overlayTitle').textContent = (f.lnbrAdres||'토지 정보').split(' ').slice(-2).join(' ');
  document.getElementById('overlayContent').innerHTML = rows.map(function(r){
    return '<div class="overlay-row"><span class="overlay-key">'+r[0]+'</span><span class="overlay-val">'+r[1]+'</span></div>';
  }).join('');
  document.getElementById('mapOverlay').classList.add('visible');
}

function showOverlayGeo(lon, lat, addr) {
  document.getElementById('overlayTitle').textContent = (addr||'위치').split(' ').slice(-2).join(' ');
  document.getElementById('overlayContent').innerHTML =
    '<div class="overlay-row"><span class="overlay-key">경도</span><span class="overlay-val">'+lon.toFixed(6)+'</span></div>'
   +'<div class="overlay-row"><span class="overlay-key">위도</span><span class="overlay-val">'+lat.toFixed(6)+'</span></div>';
  document.getElementById('mapOverlay').classList.add('visible');
}

/* 마커 */
function addMarker(lon, lat, field) {
  clearMarkers();
  var label = field && field.lndpclAr ? Number(field.lndpclAr).toLocaleString()+'㎡' : '위치';
  _marker(lon, lat, label);
}
function addMarkerSimple(lon, lat) { clearMarkers(); _marker(lon, lat, '위치'); }
function _marker(lon, lat, label) {
  if (!map) return;
  try {
    var safe = String(label).replace(/[<>&"]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]; });
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="68" viewBox="0 0 64 68">'
      +'<circle cx="32" cy="24" r="20" fill="#58a6ff" opacity=".15"/>'
      +'<circle cx="32" cy="24" r="13" fill="#58a6ff"/>'
      +'<circle cx="32" cy="24" r="5" fill="white"/>'
      +'<polygon points="32,52 24,36 40,36" fill="#58a6ff"/>'
      +'<text x="32" y="65" text-anchor="middle" font-size="8" fill="#58a6ff" font-family="sans-serif">'+safe+'</text>'
      +'</svg>';
    var m = new vw.Marker(new vw.CoordEPSG4326(lon, lat), {
      iconUrl: 'data:image/svg+xml,' + encodeURIComponent(svg),
      iconSize: [64, 68], iconAnchor: [32, 68]
    });
    map.addMarker(m);
    currentMarkers.push(m);
  } catch(e) { console.warn('마커 오류', e); }
}
function clearMarkers() {
  currentMarkers.forEach(function(m){ try{ map.removeMarker(m); }catch(e){} });
  currentMarkers = [];
}
function moveMap(lon, lat) {
  if (!map) return;
  try { map.setCenter(new vw.CoordEPSG4326(lon, lat)); map.setZoom(18); }
  catch(e) { console.warn(e); }
}

/* 유틸 */
function quickSearch(addr) { document.getElementById('addrInput').value = addr; searchAddress(); }
function clearAll() {
  document.getElementById('addrInput').value = '';
  document.getElementById('resultList').innerHTML = '<div class="empty-state"><div class="icon">🗺️</div><p>주소를 검색하면<br>토지 정보가 표시됩니다</p></div>';
  document.getElementById('mapOverlay').classList.remove('visible');
  clearMarkers(); setStatus('초기화됨', '');
}
function setStatus(msg, type) {
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('statusDot').className = 'status-dot' + (type ? ' '+type : '');
}
function setSearchBtn(disabled) {
  var btn = document.getElementById('searchBtn');
  btn.disabled = disabled;
  btn.innerHTML = disabled ? '<span class="spinner"></span>조회 중' : '검색';
}
document.getElementById('addrInput').addEventListener('keydown', function(e){ if(e.key==='Enter') searchAddress(); });
</script>

<!-- 브이월드 SDK: JS 코드 뒤에 위치시켜 vworldLoad 콜백 보장 -->
<script src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=4E0AD412-BC5D-3976-8220-FD7C550431CE"></script>
</body>
</html>
