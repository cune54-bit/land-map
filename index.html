<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>토지 대지면적 조회 지도</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;
      --border:#30363d;--accent:#58a6ff;--accent2:#3fb950;
      --accent3:#f0883e;--text:#e6edf3;--text2:#8b949e;
      --text3:#484f58;--danger:#f85149;
      --shadow:0 8px 32px rgba(0,0,0,.5);--radius:10px;
    }
    html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    .app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:360px 1fr;height:100vh}

    /* 헤더 */
    header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:10}
    .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;letter-spacing:-.3px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .spacer{flex:1}
    .hint{font-size:12px;color:var(--text3)}

    /* 패널 */
    .panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:5}
    .panel-section{padding:16px;border-bottom:1px solid var(--border)}
    .section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
    .search-wrap{display:flex;flex-direction:column;gap:8px}
    .input-row{display:flex;gap:6px}
    .input-field{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    .input-field:focus{border-color:var(--accent)}
    .input-field::placeholder{color:var(--text3)}
    .btn{padding:9px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--accent);color:#0d1117}
    .btn-primary:hover{background:#79b8ff;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .quick-btns{display:flex;gap:6px;flex-wrap:wrap}
    .quick-btn{font-size:11px;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;transition:all .15s}
    .quick-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* 결과 */
    .result-label{padding:12px 16px 4px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
    .result-scroll{flex:1;overflow-y:auto;padding:8px 12px 12px;display:flex;flex-direction:column;gap:8px}
    .result-scroll::-webkit-scrollbar{width:4px}
    .result-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);text-align:center}
    .empty-state .icon{font-size:40px;opacity:.3}
    .empty-state p{font-size:13px;line-height:1.7}

    .land-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .land-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent2);border-radius:3px 0 0 3px}
    .land-card:hover{border-color:var(--accent);transform:translateX(2px)}
    .land-card.active{border-color:var(--accent);background:rgba(88,166,255,.05)}
    .card-addr{font-size:13px;font-weight:500;margin-bottom:10px;line-height:1.5;color:var(--text)}
    .card-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .meta-item{display:flex;flex-direction:column;gap:3px}
    .meta-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
    .meta-value{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--accent)}
    .meta-value.area{color:var(--accent2);font-size:15px}
    .meta-value.tp{color:var(--accent3);font-family:'Noto Sans KR',sans-serif;font-size:12px}

    /* 상태바 */
    .status-bar{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);min-height:36px}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
    .status-dot.loading{background:var(--accent3);animation:pulse 1s infinite}
    .status-dot.ok{background:var(--accent2)}
    .status-dot.err{background:var(--danger)}

    /* 지도 */
    .map-wrap{position:relative;overflow:hidden}
    #map{width:100%;height:100%;background:#1a1f2e}

    /* Leaflet 팝업 커스텀 */
    .leaflet-popup-content-wrapper{
      background:var(--surface) !important;
      border:1px solid var(--accent) !important;
      border-radius:var(--radius) !important;
      box-shadow:var(--shadow) !important;
      color:var(--text) !important;
      font-family:'Noto Sans KR',sans-serif !important;
    }
    .leaflet-popup-tip{background:var(--surface) !important}
    .leaflet-popup-content{margin:12px 16px !important;min-width:200px}
    .popup-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .popup-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
    .popup-row:last-child{border-bottom:none}
    .popup-key{color:var(--text2)}
    .popup-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}
    .popup-val.big{color:var(--accent2);font-size:14px}

    /* 지도 타일 레이어 컨트롤 */
    .leaflet-control-layers{background:var(--surface) !important;border:1px solid var(--border) !important;border-radius:var(--radius) !important;color:var(--text) !important}
    .leaflet-control-layers-toggle{background-color:var(--surface2) !important}
    .leaflet-bar a{background:var(--surface) !important;color:var(--text) !important;border-color:var(--border) !important}
    .leaflet-bar a:hover{background:var(--surface2) !important}

    /* 스피너 */
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* 지도 위 정보 배지 */
    .map-badge{position:absolute;top:12px;right:12px;z-index:1000;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:11px;color:var(--text2);pointer-events:none;backdrop-filter:blur(4px)}
    .map-badge span{color:var(--accent2);font-weight:700}
  </style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <header>
    <div class="logo"><span class="dot"></span>토지 대지면적 조회</div>
    <span class="badge">Leaflet + VWorld WMTS</span>
    <div class="spacer"></div>
    <span class="hint">지번 주소 검색 또는 지도 클릭</span>
  </header>

  <!-- 사이드 패널 -->
  <aside class="panel">
    <div class="panel-section">
      <div class="section-label">주소 검색</div>
      <div class="search-wrap">
        <div class="input-row">
          <input class="input-field" id="addrInput" placeholder="예) 경기도 성남시 중원구 성남동 2882"/>
        </div>
        <div class="input-row">
          <button class="btn btn-primary" id="searchBtn" onclick="searchAddress()">검색</button>
          <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
        </div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="quickSearch('경기도 성남시 중원구 성남동 2882')">성남동 2882</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 강남구 역삼동 737')">역삼동 737</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 종로구 세종로 1')">세종로 1</button>
          <button class="quick-btn" onclick="quickSearch('부산광역시 해운대구 우동 1405')">해운대 1405</button>
        </div>
      </div>
    </div>

    <div class="result-label">조회 결과</div>
    <div class="result-scroll" id="resultList">
      <div class="empty-state">
        <div class="icon">🗺️</div>
        <p>주소를 검색하거나<br>지도를 클릭하면<br>토지 정보가 표시됩니다</p>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot ok" id="statusDot"></div>
      <span id="statusMsg">준비됨</span>
    </div>
  </aside>

  <!-- 지도 -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-badge" id="mapBadge" style="display:none">
      대지면적 <span id="badgeArea">-</span>
    </div>
  </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
var API_KEY  = '4E0AD412-BC5D-3976-8220-FD7C550431CE';
var GEO_URL  = 'https://api.vworld.kr/req/address';
var LAND_URL = 'https://api.vworld.kr/ned/data/ladfrlList';
var cbIdx = 0, currentMarker = null;

/* ── JSONP ─────────────────────────────────── */
function jsonp(url, params) {
  return new Promise(function(resolve, reject) {
    var cbName = '__cb' + (cbIdx++);
    params.callback = cbName;
    var qs = Object.keys(params).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    var timer = setTimeout(function() { cleanup(); reject(new Error('요청 시간 초과')); }, 10000);
    window[cbName] = function(d) { cleanup(); resolve(d); };
    var s = document.createElement('script');
    s.src = url + '?' + qs;
    s.onerror = function() { cleanup(); reject(new Error('API 연결 실패')); };
    document.head.appendChild(s);
    function cleanup() {
      clearTimeout(timer); delete window[cbName];
      if (s.parentNode) s.parentNode.removeChild(s);
    }
  });
}

/* ── 응답 파싱 ──────────────────────────────── */
function parseLandResponse(data) {
  // 실제 응답: data.ladfrlVOList.ladfrlVOList
  if (data && data.ladfrlVOList && data.ladfrlVOList.ladfrlVOList) {
    var list = data.ladfrlVOList.ladfrlVOList;
    return Array.isArray(list) ? list : [list];
  }
  // 구버전 응답 대비
  if (data && data.ladfrlList && data.ladfrlList.field) {
    var f = data.ladfrlList.field;
    return Array.isArray(f) ? f : [f];
  }
  return null;
}

function normalizeField(f) {
  return {
    addr:  f.ldCodeNm   || f.lnbrAdres   || '-',
    area:  f.lndpclAr   || '-',
    type:  f.lndcgrCodeNm || f.lndcgrCdNm || '-',
    zone:  f.prposArea1 || '-',
    price: f.pblntfPclnd || '-',
    pnu:   f.pnu        || '-',
    owner: f.posesnSeCodeNm || '-',
    date:  f.lastUpdtDt || '-'
  };
}

/* ── Leaflet 지도 초기화 ─────────────────────  */
var map = L.map('map', {
  center: [37.4342, 127.1429],
  zoom: 16,
  zoomControl: true,
  attributionControl: true
});

// 브이월드 배경지도 타일 (WMTS) - 도메인 등록 불필요
var vworldBase = L.tileLayer(
  'https://api.vworld.kr/req/wmts/1.0.0/' + API_KEY + '/Base/{z}/{y}/{x}.png',
  {
    maxZoom: 19,
    attribution: '© <a href="https://www.vworld.kr">VWorld</a>',
    tileSize: 256
  }
);

// 브이월드 위성사진 타일
var vworldSatellite = L.tileLayer(
  'https://api.vworld.kr/req/wmts/1.0.0/' + API_KEY + '/Satellite/{z}/{y}/{x}.jpeg',
  {
    maxZoom: 19,
    attribution: '© <a href="https://www.vworld.kr">VWorld</a>',
    tileSize: 256
  }
);

// 브이월드 하이브리드(위성+도로) 오버레이
var vworldHybrid = L.tileLayer(
  'https://api.vworld.kr/req/wmts/1.0.0/' + API_KEY + '/Hybrid/{z}/{y}/{x}.png',
  { maxZoom: 19, tileSize: 256, opacity: 0.9 }
);

// 기본 배경지도 적용
vworldBase.addTo(map);

// 레이어 컨트롤
var baseMaps = {
  '🗺️ 일반지도': vworldBase,
  '🛰️ 위성사진': vworldSatellite
};
var overlayMaps = {
  '도로 오버레이': vworldHybrid
};
L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);

// 지도 클릭 이벤트
map.on('click', function(e) {
  reverseGeocode(e.latlng.lng, e.latlng.lat);
});

/* ── 커스텀 마커 아이콘 ──────────────────────  */
function makeIcon(label) {
  var safe = String(label).replace(/[<>&"]/g, function(c) {
    return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];
  });
  var svg = [
    '<svg xmlns="http://www.w3.org/2000/svg" width="60" height="72" viewBox="0 0 60 72">',
    '<filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity=".4"/></filter>',
    '<g filter="url(#sh)">',
    '<circle cx="30" cy="26" r="22" fill="#58a6ff" opacity=".2"/>',
    '<circle cx="30" cy="26" r="16" fill="#58a6ff"/>',
    '<circle cx="30" cy="26" r="7" fill="white"/>',
    '<path d="M30 55 L22 40 Q30 44 38 40 Z" fill="#58a6ff"/>',
    '</g>',
    '<text x="30" y="70" text-anchor="middle" font-size="9" font-weight="bold" fill="#3fb950" font-family="sans-serif">' + safe + '</text>',
    '</svg>'
  ].join('');
  return L.divIcon({
    html: '<div style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))">' + svg + '</div>',
    iconSize: [60, 72],
    iconAnchor: [30, 68],
    popupAnchor: [0, -70],
    className: ''
  });
}

/* ── 주소 검색 ───────────────────────────────  */
async function searchAddress() {
  var addr = document.getElementById('addrInput').value.trim();
  if (!addr) { setStatus('주소를 입력해주세요', 'err'); return; }
  setStatus('주소 변환 중...', 'loading'); setSearchBtn(true);
  try {
    var data = await jsonp(GEO_URL, {
      service:'address', request:'getcoord', key:API_KEY,
      address:addr, type:'PARCEL', format:'json', errorFormat:'json', verbose:'true'
    });
    if (!data.response || data.response.status !== 'OK') {
      setStatus('주소를 찾을 수 없습니다', 'err');
      showEmpty('"' + addr + '" 검색 결과 없음'); return;
    }
    var pt  = data.response.result.point;
    var pnu = '';
    if (data.response.refined && data.response.refined.structure)
      pnu = data.response.refined.structure.level4LC || '';
    setStatus('토지 정보 조회 중...', 'loading');
    await fetchLandInfo(parseFloat(pt.x), parseFloat(pt.y), pnu, addr);
  } catch(e) {
    setStatus('오류: ' + e.message, 'err'); console.error(e);
  } finally { setSearchBtn(false); }
}

/* ── 역지오코딩 (지도 클릭) ─────────────────  */
async function reverseGeocode(lon, lat) {
  setStatus('클릭 위치 조회 중...', 'loading');
  try {
    var data = await jsonp(GEO_URL, {
      service:'address', request:'getAddress', key:API_KEY,
      point: lon + ',' + lat, type:'PARCEL', format:'json', errorFormat:'json'
    });
    if (!data.response || data.response.status !== 'OK') {
      setStatus('해당 위치 주소 없음', 'err'); return;
    }
    var r = Array.isArray(data.response.result)
      ? data.response.result[0] : data.response.result;
    if (!r) { setStatus('주소 정보 없음', 'err'); return; }
    var addr = r.text || '';
    var pnu  = (r.structure && r.structure.level4LC) ? r.structure.level4LC : '';
    document.getElementById('addrInput').value = addr;
    setStatus('토지 정보 조회 중...', 'loading');
    await fetchLandInfo(lon, lat, pnu, addr);
  } catch(e) { setStatus('오류: ' + e.message, 'err'); }
}

/* ── 토지임야정보 조회 ───────────────────────  */
async function fetchLandInfo(lon, lat, pnu, addr) {
  var p = {
    key: API_KEY,
    domain: 'https://cune54-bit.github.io',
    format: 'json', numOfRows: '5', pageNo: '1'
  };
  if (pnu && pnu.length >= 19) p.pnu = pnu;
  else { p.x = String(lon); p.y = String(lat); p.crs = 'EPSG:4326'; }

  try {
    var data = await jsonp(LAND_URL, p);
    var fields = parseLandResponse(data);
    if (fields && fields.length > 0) {
      renderCards(fields);
      placeMarker(lat, lon, normalizeField(fields[0]));
      setStatus(fields.length + '건 조회됨', 'ok');
    } else {
      renderGeoOnly(lon, lat, addr, pnu);
      placeMarkerSimple(lat, lon, addr);
    }
  } catch(e) {
    renderGeoOnly(lon, lat, addr, pnu);
    placeMarkerSimple(lat, lon, addr);
    console.warn(e);
  }
  map.setView([lat, lon], 18);
}

/* ── 마커 & 팝업 ─────────────────────────────  */
function placeMarker(lat, lon, f) {
  if (currentMarker) map.removeLayer(currentMarker);
  var areaDisp  = f.area  !== '-' ? Number(f.area).toLocaleString()  + ' ㎡'    : '-';
  var priceDisp = f.price !== '-' ? Number(f.price).toLocaleString() + ' 원/㎡' : '-';
  var popupHtml =
    '<div class="popup-title">' + f.addr.split(' ').slice(-3).join(' ') + '</div>'
    + '<div class="popup-row"><span class="popup-key">대지면적</span><span class="popup-val big">' + areaDisp + '</span></div>'
    + '<div class="popup-row"><span class="popup-key">지목</span><span class="popup-val">' + f.type + '</span></div>'
    + '<div class="popup-row"><span class="popup-key">소유구분</span><span class="popup-val">' + f.owner + '</span></div>'
    + '<div class="popup-row"><span class="popup-key">최종수정</span><span class="popup-val">' + f.date + '</span></div>';
  currentMarker = L.marker([lat, lon], { icon: makeIcon(areaDisp) })
    .addTo(map)
    .bindPopup(popupHtml, { maxWidth: 280 })
    .openPopup();

  // 배지 표시
  if (f.area !== '-') {
    document.getElementById('badgeArea').textContent = Number(f.area).toLocaleString() + ' ㎡';
    document.getElementById('mapBadge').style.display = 'block';
  }
}

function placeMarkerSimple(lat, lon, addr) {
  if (currentMarker) map.removeLayer(currentMarker);
  var label = (addr || '').split(' ').slice(-1)[0] || '위치';
  var popupHtml =
    '<div class="popup-title">' + (addr||'위치') + '</div>'
    + '<div class="popup-row"><span class="popup-key">위도</span><span class="popup-val">' + lat.toFixed(5) + '</span></div>'
    + '<div class="popup-row"><span class="popup-key">경도</span><span class="popup-val">' + lon.toFixed(5) + '</span></div>';
  currentMarker = L.marker([lat, lon], { icon: makeIcon(label) })
    .addTo(map)
    .bindPopup(popupHtml)
    .openPopup();
  document.getElementById('mapBadge').style.display = 'none';
}

/* ── 카드 렌더링 ─────────────────────────────  */
function renderCards(fields) {
  var list = document.getElementById('resultList');
  list.innerHTML = '';
  fields.forEach(function(raw, i) {
    var f = normalizeField(raw);
    var card = document.createElement('div');
    card.className = 'land-card' + (i === 0 ? ' active' : '');
    var areaDisp  = f.area  !== '-' ? Number(f.area).toLocaleString()  + ' ㎡'    : '-';
    var priceDisp = f.price !== '-' ? Number(f.price).toLocaleString() + ' 원/㎡' : '-';
    card.innerHTML =
      '<div class="card-addr">' + f.addr + '</div>'
      + '<div class="card-meta">'
      + '<div class="meta-item"><span class="meta-label">대지면적</span><span class="meta-value area">' + areaDisp + '</span></div>'
      + '<div class="meta-item"><span class="meta-label">지목</span><span class="meta-value tp">' + f.type + '</span></div>'
      + '<div class="meta-item"><span class="meta-label">소유구분</span><span class="meta-value tp">' + f.owner + '</span></div>'
      + '<div class="meta-item"><span class="meta-label">최종수정</span><span class="meta-value" style="font-size:11px">' + f.date + '</span></div>'
      + '</div>';
    (function(fi, ci) {
      ci.onclick = function() {
        document.querySelectorAll('.land-card').forEach(function(c, j) {
          c.classList.toggle('active', j === i);
        });
      };
    })(f, card);
    list.appendChild(card);
  });
}

function renderGeoOnly(lon, lat, addr, pnu) {
  var list = document.getElementById('resultList');
  list.innerHTML = '';
  var card = document.createElement('div');
  card.className = 'land-card active';
  card.innerHTML =
    '<div class="card-addr">' + (addr || '주소 없음') + '</div>'
    + '<div class="card-meta">'
    + '<div class="meta-item"><span class="meta-label">경도</span><span class="meta-value">' + lon.toFixed(5) + '</span></div>'
    + '<div class="meta-item"><span class="meta-label">위도</span><span class="meta-value">' + lat.toFixed(5) + '</span></div>'
    + '<div class="meta-item" style="grid-column:1/-1"><span class="meta-label">PNU</span><span class="meta-value" style="font-size:11px">' + (pnu || '-') + '</span></div>'
    + '</div>'
    + '<div style="margin-top:8px;padding:8px 10px;background:rgba(240,136,62,.08);border:1px solid rgba(240,136,62,.3);border-radius:8px;font-size:11px;color:#f0883e;line-height:1.6">'
    + '⚠️ 토지임야정보는 vworld.kr에서<br>도메인 등록 후 이용 가능합니다</div>';
  list.appendChild(card);
  setStatus('위치 표시됨 (토지 상세 없음)', 'err');
  document.getElementById('mapBadge').style.display = 'none';
}

function showEmpty(msg) {
  document.getElementById('resultList').innerHTML =
    '<div class="empty-state"><div class="icon">🔍</div><p>' + msg + '</p></div>';
}

/* ── 유틸 ────────────────────────────────────  */
function quickSearch(addr) {
  document.getElementById('addrInput').value = addr;
  searchAddress();
}
function clearAll() {
  document.getElementById('addrInput').value = '';
  document.getElementById('resultList').innerHTML =
    '<div class="empty-state"><div class="icon">🗺️</div><p>주소를 검색하거나<br>지도를 클릭하면<br>토지 정보가 표시됩니다</p></div>';
  if (currentMarker) { map.removeLayer(currentMarker); currentMarker = null; }
  document.getElementById('mapBadge').style.display = 'none';
  setStatus('초기화됨', '');
}
function setStatus(msg, type) {
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('statusDot').className = 'status-dot' + (type ? ' ' + type : '');
}
function setSearchBtn(disabled) {
  var btn = document.getElementById('searchBtn');
  btn.disabled = disabled;
  btn.innerHTML = disabled ? '<span class="spinner"></span>조회 중' : '검색';
}
document.getElementById('addrInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchAddress();
});
</script>
</body>
</html>
