<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>토지정보 조회 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;
      --border:#30363d;--accent:#58a6ff;--accent2:#3fb950;
      --accent3:#f0883e;--text:#e6edf3;--text2:#8b949e;
      --text3:#484f58;--danger:#f85149;
      --shadow:0 8px 32px rgba(0,0,0,.5);--radius:10px;
    }
    html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    .app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:380px 1fr;height:100vh}
    header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:10}
    .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .spacer{flex:1}
    .hint-text{font-size:12px;color:var(--text3)}
    .panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .panel-section{padding:16px;border-bottom:1px solid var(--border)}
    .section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
    .search-wrap{display:flex;flex-direction:column;gap:8px}
    .input-row{display:flex;gap:6px}
    .input-field{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    .input-field:focus{border-color:var(--accent)}
    .input-field::placeholder{color:var(--text3)}
    .btn{padding:9px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--accent);color:#0d1117}
    .btn-primary:hover{background:#79b8ff;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .quick-btns{display:flex;gap:6px;flex-wrap:wrap}
    .quick-btn{font-size:11px;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;transition:all .15s}
    .quick-btn:hover{border-color:var(--accent);color:var(--accent)}
    .result-label{padding:12px 16px 4px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
    .result-scroll{flex:1;overflow-y:auto;padding:8px 12px 12px;display:flex;flex-direction:column;gap:8px}
    .result-scroll::-webkit-scrollbar{width:4px}
    .result-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);text-align:center}
    .empty-state .icon{font-size:40px;opacity:.3}
    .empty-state p{font-size:13px;line-height:1.7}
    .info-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .info-card-header{padding:12px 14px;background:rgba(88,166,255,.06);border-bottom:1px solid var(--border)}
    .info-card-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.5}
    .info-card-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace}
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
    .kpi-item{padding:14px 12px;display:flex;flex-direction:column;gap:4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
    .kpi-item:nth-child(2n){border-right:none}
    .kpi-item:nth-last-child(-n+2){border-bottom:none}
    .kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
    .kpi-val-area{font-size:22px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent2);line-height:1}
    .kpi-val-unit{font-size:11px;color:var(--text2);margin-top:3px}
    .kpi-val-text{font-size:14px;font-weight:600;color:var(--accent);font-family:'Noto Sans KR',sans-serif;line-height:1.3}
    .kpi-val-warn{font-size:13px;font-weight:600;color:var(--accent3);font-family:'Noto Sans KR',sans-serif;line-height:1.3}
    .kpi-val-owner{font-size:14px;font-weight:600;color:var(--text);font-family:'Noto Sans KR',sans-serif}
    .info-table{padding:2px 0}
    .info-row{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);gap:10px}
    .info-row:last-child{border-bottom:none}
    .info-key{font-size:11px;color:var(--text2);min-width:68px;flex-shrink:0}
    .info-val{font-size:12px;color:var(--text);font-weight:500;flex:1;text-align:right;word-break:break-all;font-family:'JetBrains Mono',monospace}
    .info-val.normal{font-family:'Noto Sans KR',sans-serif}
    .status-bar{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);min-height:36px}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .status-dot.loading{background:var(--accent3);animation:pulse 1s infinite}
    .status-dot.ok{background:var(--accent2)}
    .status-dot.err{background:var(--danger)}
    .map-wrap{position:relative;overflow:hidden}
    #map{width:100%;height:100%;background:#1a1f2e;cursor:crosshair}
    .map-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(13,17,23,.88);border:1px solid var(--border);border-radius:20px;padding:7px 18px;font-size:12px;color:var(--text2);pointer-events:none;backdrop-filter:blur(8px);white-space:nowrap;transition:opacity .4s}
    .map-hint.hide{opacity:0}
    .leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--accent)!important;border-radius:var(--radius)!important;box-shadow:var(--shadow)!important;font-family:'Noto Sans KR',sans-serif!important}
    .leaflet-popup-tip{background:var(--surface)!important}
    .leaflet-popup-content{margin:0!important;padding:0!important;min-width:230px}
    .popup-head{padding:10px 14px;background:rgba(88,166,255,.08);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--accent)}
    .popup-body{padding:4px 0}
    .popup-row{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;font-size:12px;border-bottom:1px solid var(--border)}
    .popup-row:last-child{border-bottom:none}
    .popup-k{color:var(--text2);flex-shrink:0}
    .popup-v{font-weight:600;color:var(--text);text-align:right;font-family:'JetBrains Mono',monospace}
    .popup-v.area{color:var(--accent2);font-size:15px}
    .popup-v.tp{color:var(--accent3);font-family:'Noto Sans KR',sans-serif}
    .leaflet-bar a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important}
    .leaflet-bar a:hover{background:var(--surface2)!important}
    .leaflet-control-layers{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:var(--radius)!important;color:var(--text)!important}
    .leaflet-control-attribution{background:rgba(13,17,23,.7)!important;color:var(--text3)!important}
    .leaflet-control-attribution a{color:var(--accent)!important}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .click-ripple{position:absolute;width:44px;height:44px;border-radius:50%;border:2px solid var(--accent);transform:translate(-50%,-50%) scale(0);animation:ripple .65s ease-out forwards;pointer-events:none;z-index:2000}
    @keyframes ripple{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><span class="dot"></span>토지정보 조회</div>
    <span class="badge">Leaflet + VWorld WMTS</span>
    <div class="spacer"></div>
    <span class="hint-text">🖱️ 지도 클릭 → 필지 정보 자동 조회</span>
  </header>

  <aside class="panel">
    <div class="panel-section">
      <div class="section-label">주소로 이동</div>
      <div class="search-wrap">
        <div class="input-row">
          <input class="input-field" id="addrInput" placeholder="예) 경기도 성남시 중원구 성남동 2882"/>
        </div>
        <div class="input-row">
          <button class="btn btn-primary" id="searchBtn" onclick="searchAddress()">검색</button>
          <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
        </div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="quickSearch('경기도 성남시 중원구 성남동 2882')">성남동 2882</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 강남구 역삼동 737')">역삼동 737</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 종로구 세종로 1')">세종로 1</button>
          <button class="quick-btn" onclick="quickSearch('부산광역시 해운대구 우동 1405')">해운대 1405</button>
        </div>
      </div>
    </div>

    <div class="result-label">필지 정보</div>
    <div class="result-scroll" id="resultList">
      <div class="empty-state">
        <div class="icon">🏛️</div>
        <p><strong>지도를 클릭</strong>하면<br>해당 필지의 토지 정보가<br>자동으로 표시됩니다</p>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot ok" id="statusDot"></div>
      <span id="statusMsg">지도를 클릭해 필지를 선택하세요</span>
    </div>
  </aside>

  <div class="map-wrap" id="mapWrap">
    <div id="map"></div>
    <div class="map-hint" id="mapHint">🖱️ 지도 위 대지를 클릭하면 토지 정보를 조회합니다</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var API_KEY  = '4E0AD412-BC5D-3976-8220-FD7C550431CE';
var GEO_URL  = 'https://api.vworld.kr/req/address';
var LAND_URL = 'https://api.vworld.kr/ned/data/ladfrlList';
var cbIdx = 0, currentMarker = null;

/* ── JSONP ─────────────────────────────────── */
function jsonp(url, params) {
  return new Promise(function(resolve, reject) {
    var cbName = '__cb' + (cbIdx++);
    params.callback = cbName;
    var qs = Object.keys(params).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    var timer = setTimeout(function() { cleanup(); reject(new Error('요청 시간 초과')); }, 10000);
    window[cbName] = function(d) { cleanup(); resolve(d); };
    var s = document.createElement('script');
    s.src = url + '?' + qs;
    s.onerror = function() { cleanup(); reject(new Error('연결 실패')); };
    document.head.appendChild(s);
    function cleanup() {
      clearTimeout(timer); delete window[cbName];
      if (s.parentNode) s.parentNode.removeChild(s);
    }
  });
}

/* ── PNU 19자리 조합 ────────────────────────────
   역지오코딩 응답 구조:
   level4LC = 법정동코드 10자리  (예: 1114010300)
   level5   = 지번 문자열        (예: "61-29도", "2882")
   
   PNU = level4LC(10) + 산여부(1) + 본번(4자리, zero-pad) + 부번(4자리, zero-pad)
   산: level5에 "산"이 포함되면 2, 아니면 1
*/
function buildPNU(level4LC, level5) {
  if (!level4LC || level4LC.length < 10) return '';
  var jibun = String(level5 || '').trim();

  // 산 여부
  var san = jibun.indexOf('산') >= 0 ? '2' : '1';

  // 숫자만 추출
  var clean = jibun.replace(/[^0-9\-]/g, '');
  var parts  = clean.split('-');
  var bonbun = parts[0] ? String(parseInt(parts[0], 10)) : '0';
  var bubun  = parts[1] ? String(parseInt(parts[1], 10)) : '0';

  // 4자리로 패딩
  function pad4(s) { return ('0000' + s).slice(-4); }

  var pnu = level4LC + san + pad4(bonbun) + pad4(bubun);
  console.log('PNU 조합:', level4LC, '+', san, '+', pad4(bonbun), '+', pad4(bubun), '=', pnu);
  return pnu;
}

/* ── 응답 파싱 ──────────────────────────────── */
function parseLandResponse(data) {
  if (data && data.ladfrlVOList && data.ladfrlVOList.ladfrlVOList) {
    var list = data.ladfrlVOList.ladfrlVOList;
    return Array.isArray(list) ? list : [list];
  }
  if (data && data.ladfrlList && data.ladfrlList.field) {
    var f = data.ladfrlList.field;
    return Array.isArray(f) ? f : [f];
  }
  return null;
}

/* ── 필드 정규화 ────────────────────────────── */
function normalizeField(f) {
  return {
    addr:   f.ldCodeNm       || '-',
    jibun:  f.mnnmSlno       || '-',
    area:   f.lndpclAr       || '-',   // ★ 대지면적
    type:   f.lndcgrCodeNm   || '-',   // ★ 지목
    owner:  f.posesnSeCodeNm || '-',   // ★ 소유구분
    pnu:    f.pnu            || '-',
    date:   f.lastUpdtDt     || '-',
    regstr: f.regstrSeCodeNm || '-',
    scan:   f.ladFrtlScNm    || '-'
  };
}

/* ── Leaflet 지도 초기화 ─────────────────────  */
var map = L.map('map', { center: [37.5665, 126.9780], zoom: 14 });

var baseLayer = L.tileLayer(
  'https://api.vworld.kr/req/wmts/1.0.0/' + API_KEY + '/Base/{z}/{y}/{x}.png',
  { maxZoom: 19, attribution: '© <a href="https://www.vworld.kr">VWorld</a>' }
).addTo(map);

var satLayer = L.tileLayer(
  'https://api.vworld.kr/req/wmts/1.0.0/' + API_KEY + '/Satellite/{z}/{y}/{x}.jpeg',
  { maxZoom: 19, attribution: '© VWorld' }
);

var hybridLayer = L.tileLayer(
  'https://api.vworld.kr/req/wmts/1.0.0/' + API_KEY + '/Hybrid/{z}/{y}/{x}.png',
  { maxZoom: 19, opacity: 0.9 }
);

L.control.layers(
  { '🗺️ 일반지도': baseLayer, '🛰️ 위성사진': satLayer },
  { '📍 도로 오버레이': hybridLayer },
  { position: 'topright' }
).addTo(map);

/* ── 지도 클릭 → 역지오코딩 → PNU 조합 → 토지 조회 ── */
map.on('click', function(e) {
  showRipple(e.originalEvent.clientX, e.originalEvent.clientY);
  document.getElementById('mapHint').classList.add('hide');
  clickAndFetch(e.latlng.lng, e.latlng.lat);
});

function showRipple(x, y) {
  var wrap = document.getElementById('mapWrap');
  var rect = wrap.getBoundingClientRect();
  var el = document.createElement('div');
  el.className = 'click-ripple';
  el.style.left = (x - rect.left) + 'px';
  el.style.top  = (y - rect.top)  + 'px';
  wrap.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 700);
}

/* ── 핵심: 클릭 → 역지오코딩 → PNU 조합 → 토지조회 ── */
async function clickAndFetch(lon, lat) {
  setStatus('위치 분석 중...', 'loading');

  var addr = '', pnu = '';

  try {
    // 1단계: 역지오코딩으로 주소 + 법정동코드 + 지번 획득
    var geoData = await jsonp(GEO_URL, {
      service: 'address', request: 'getAddress', key: API_KEY,
      point: lon + ',' + lat, type: 'PARCEL',
      format: 'json', errorFormat: 'json'
    });

    if (geoData.response && geoData.response.status === 'OK') {
      var r = Array.isArray(geoData.response.result)
        ? geoData.response.result[0] : geoData.response.result;

      if (r && r.structure) {
        addr          = r.text || '';
        var level4LC  = r.structure.level4LC || '';  // 법정동코드 10자리
        var level5    = r.structure.level5   || '';  // 지번 (예: "2882", "61-29도")

        // 2단계: PNU 19자리 조합
        pnu = buildPNU(level4LC, level5);
        console.log('역지오코딩 결과:', addr, '/ level4LC:', level4LC, '/ level5:', level5, '/ PNU:', pnu);
      }
    }
  } catch(e) {
    console.warn('역지오코딩 오류:', e);
  }

  if (addr) document.getElementById('addrInput').value = addr;

  // 3단계: PNU로 토지임야정보 조회
  setStatus('토지 정보 조회 중...', 'loading');
  await fetchLandByPNU(lon, lat, pnu, addr);
}

/* ── PNU로 토지임야정보 조회 ─────────────────  */
async function fetchLandByPNU(lon, lat, pnu, addr) {
  if (!pnu || pnu.length !== 19) {
    console.warn('PNU 오류:', pnu);
    renderNoData(lon, lat, addr, pnu, 'PNU를 생성할 수 없습니다 (건물·도로 위 클릭 시 발생)');
    placeMarkerSimple(lat, lon);
    map.setView([lat, lon], 18);
    return;
  }

  var p = {
    key: API_KEY,
    domain: 'https://cune54-bit.github.io',
    format: 'json', numOfRows: '1', pageNo: '1',
    pnu: pnu
  };

  try {
    var data = await jsonp(LAND_URL, p);
    var fields = parseLandResponse(data);

    if (fields && fields.length > 0) {
      var f = normalizeField(fields[0]);
      var fullAddr = f.addr + (f.jibun !== '-' ? ' ' + f.jibun : '');
      if (addr && addr.length > fullAddr.length) fullAddr = addr;

      renderInfoCard(f, fullAddr, lon, lat);
      placeMarker(lat, lon, f, fullAddr);
      map.setView([lat, lon], 18);
      setStatus('조회 완료 ✓', 'ok');
    } else {
      renderNoData(lon, lat, addr, pnu, '해당 필지 토지정보가 없습니다');
      placeMarkerSimple(lat, lon);
      map.setView([lat, lon], 18);
    }
  } catch(e) {
    renderNoData(lon, lat, addr, pnu, '조회 오류: ' + e.message);
    placeMarkerSimple(lat, lon);
    map.setView([lat, lon], 18);
    console.warn(e);
  }
}

/* ── 주소 검색 (지도 이동 + 클릭 조회) ────────  */
async function searchAddress() {
  var addr = document.getElementById('addrInput').value.trim();
  if (!addr) { setStatus('주소를 입력해주세요', 'err'); return; }
  setStatus('주소 변환 중...', 'loading'); setSearchBtn(true);

  try {
    var data = await jsonp(GEO_URL, {
      service: 'address', request: 'getcoord', key: API_KEY,
      address: addr, type: 'PARCEL',
      format: 'json', errorFormat: 'json', verbose: 'true'
    });

    if (!data.response || data.response.status !== 'OK') {
      setStatus('주소를 찾을 수 없습니다', 'err');
      showEmpty('"' + addr + '" 결과 없음'); return;
    }

    var pt  = data.response.result.point;
    var lon = parseFloat(pt.x);
    var lat = parseFloat(pt.y);

    // refined에서 level4LC, level5 추출해 PNU 조합
    var pnu = '';
    if (data.response.refined && data.response.refined.structure) {
      var st = data.response.refined.structure;
      pnu = buildPNU(st.level4LC || '', st.level5 || '');
    }

    document.getElementById('mapHint').classList.add('hide');
    setStatus('토지 정보 조회 중...', 'loading');
    await fetchLandByPNU(lon, lat, pnu, addr);

  } catch(e) {
    setStatus('오류: ' + e.message, 'err');
  } finally { setSearchBtn(false); }
}

/* ── 카드 렌더링 ─────────────────────────────  */
function renderInfoCard(f, fullAddr, lon, lat) {
  var areaNum  = f.area  !== '-' ? Number(f.area)  : null;
  var areaDisp = areaNum ? areaNum.toLocaleString() : '-';

  document.getElementById('resultList').innerHTML =
    '<div class="info-card">'

    // 헤더
    + '<div class="info-card-header">'
    + '<div class="info-card-title">📍 ' + fullAddr + '</div>'
    + '<div class="info-card-sub">' + f.pnu + '</div>'
    + '</div>'

    // KPI 4칸
    + '<div class="kpi-grid">'

    // 1. 대지면적 ★
    + '<div class="kpi-item">'
    + '<span class="kpi-label">대지면적</span>'
    + '<span class="kpi-val-area">' + areaDisp + '</span>'
    + '<span class="kpi-val-unit">㎡ (제곱미터)</span>'
    + '</div>'

    // 2. 지목 ★
    + '<div class="kpi-item">'
    + '<span class="kpi-label">지목</span>'
    + '<span class="kpi-val-text">' + f.type + '</span>'
    + '<span class="kpi-val-unit">' + f.regstr + '</span>'
    + '</div>'

    // 3. 용도지역 ★ (API 미제공 → 토지이음 안내)
    + '<div class="kpi-item">'
    + '<span class="kpi-label">용도지역</span>'
    + '<span class="kpi-val-warn" style="font-size:11px">토지이음에서 확인</span>'
    + '<span class="kpi-val-unit"><a href="https://eum.go.kr" target="_blank" style="color:var(--accent);text-decoration:none">eum.go.kr →</a></span>'
    + '</div>'

    // 4. 소유구분 ★
    + '<div class="kpi-item">'
    + '<span class="kpi-label">소유구분</span>'
    + '<span class="kpi-val-owner">' + f.owner + '</span>'
    + '</div>'

    + '</div>' // kpi-grid

    // 추가정보
    + '<div class="info-table">'
    + '<div class="info-row"><span class="info-key">측량구분</span><span class="info-val normal">' + f.scan + '</span></div>'
    + '<div class="info-row"><span class="info-key">최종수정</span><span class="info-val">' + f.date + '</span></div>'
    + '<div class="info-row"><span class="info-key">좌표</span><span class="info-val" style="font-size:10px">' + lat.toFixed(6) + ', ' + lon.toFixed(6) + '</span></div>'
    + '</div>'

    + '</div>';
}

function renderNoData(lon, lat, addr, pnu, msg) {
  document.getElementById('resultList').innerHTML =
    '<div class="info-card">'
    + '<div class="info-card-header">'
    + '<div class="info-card-title">📍 ' + (addr || '위치 정보') + '</div>'
    + '<div class="info-card-sub">' + (pnu || '-') + '</div>'
    + '</div>'
    + '<div style="padding:16px 14px;font-size:13px;color:var(--text2);line-height:1.8">'
    + (msg || '토지 정보를 가져오지 못했습니다') + '<br>'
    + '<small style="color:var(--text3)">건물·도로·강 위는 클릭이 되지 않을 수 있습니다.<br>필지(땅) 위를 클릭해 주세요.</small>'
    + '</div>'
    + '</div>';

function showEmpty(msg) {
  document.getElementById('resultList').innerHTML =
    '<div class="empty-state"><div class="icon">🔍</div><p>' + msg + '</p></div>';
}

/* ── 마커 & 팝업 ─────────────────────────────  */
function makeIcon(areaDisp, color) {
  color = color || '#58a6ff';
  var label = areaDisp || '';
  var safe = label.replace(/[<>&"]/g, function(c) {
    return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];
  });
  var svg =
    '<svg xmlns="http://www.w3.org/2000/svg" width="56" height="70" viewBox="0 0 56 70">'
    + '<circle cx="28" cy="24" r="22" fill="' + color + '" opacity=".18"/>'
    + '<circle cx="28" cy="24" r="15" fill="' + color + '"/>'
    + '<circle cx="28" cy="24" r="6"  fill="white"/>'
    + '<path d="M28 54 L20 36 Q28 40 36 36 Z" fill="' + color + '"/>'
    + '<text x="28" y="67" text-anchor="middle" font-size="8" font-weight="bold" fill="' + color + '" font-family="sans-serif">' + safe + '</text>'
    + '</svg>';
  return L.divIcon({ html: svg, iconSize:[56,70], iconAnchor:[28,66], popupAnchor:[0,-68], className:'' });
}

function placeMarker(lat, lon, f, fullAddr) {
  if (currentMarker) map.removeLayer(currentMarker);
  var areaDisp = f.area !== '-' ? Number(f.area).toLocaleString() + '㎡' : '-';
  var popup =
    '<div class="popup-head">' + fullAddr.split(' ').slice(-3).join(' ') + '</div>'
    + '<div class="popup-body">'
    + '<div class="popup-row"><span class="popup-k">대지면적</span><span class="popup-v area">' + (f.area !== '-' ? Number(f.area).toLocaleString() + ' ㎡' : '-') + '</span></div>'
    + '<div class="popup-row"><span class="popup-k">지목</span><span class="popup-v tp">' + f.type + '</span></div>'
    + '<div class="popup-row"><span class="popup-k">용도지역</span><span class="popup-v tp"><a href="https://eum.go.kr" target="_blank" style="color:var(--accent)">토지이음 확인</a></span></div>'
    + '<div class="popup-row"><span class="popup-k">소유구분</span><span class="popup-v">' + f.owner + '</span></div>'
    + '</div>';
  currentMarker = L.marker([lat, lon], { icon: makeIcon(areaDisp, '#3fb950') })
    .addTo(map).bindPopup(popup, { maxWidth: 280 }).openPopup();
}

function placeMarkerSimple(lat, lon) {
  if (currentMarker) map.removeLayer(currentMarker);
  currentMarker = L.marker([lat, lon], { icon: makeIcon('', '#58a6ff') }).addTo(map);
}

/* ── 유틸 ────────────────────────────────────  */
function quickSearch(addr) { document.getElementById('addrInput').value = addr; searchAddress(); }
function clearAll() {
  document.getElementById('addrInput').value = '';
  document.getElementById('resultList').innerHTML =
    '<div class="empty-state"><div class="icon">🏛️</div><p><strong>지도를 클릭</strong>하면<br>해당 필지의 토지 정보가<br>자동으로 표시됩니다</p></div>';
  if (currentMarker) { map.removeLayer(currentMarker); currentMarker = null; }
  document.getElementById('mapHint').classList.remove('hide');
  setStatus('지도를 클릭해 필지를 선택하세요', '');
}
function setStatus(msg, type) {
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('statusDot').className = 'status-dot' + (type ? ' ' + type : '');
}
function setSearchBtn(dis) {
  var b = document.getElementById('searchBtn');
  b.disabled = dis;
  b.innerHTML = dis ? '<span class="spinner"></span>조회 중' : '검색';
}
document.getElementById('addrInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchAddress();
});
</script>
