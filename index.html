<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>토지 대지면적 조회 지도</title>
  <script type="text/javascript" src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=4E0AD412-BC5D-3976-8220-FD7C550431CE"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
      --border: #30363d; --accent: #58a6ff; --accent2: #3fb950;
      --accent3: #f0883e; --text: #e6edf3; --text2: #8b949e;
      --text3: #484f58; --danger: #f85149;
      --shadow: 0 8px 32px rgba(0,0,0,0.4); --radius: 10px;
    }
    html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    .app { display: grid; grid-template-rows: 56px 1fr; grid-template-columns: 360px 1fr; height: 100vh; }
    header {
      grid-column: 1 / -1; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; }
    .logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    .badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
    .spacer { flex: 1; }
    .hint { font-size: 12px; color: var(--text3); }
    .panel { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    .search-wrap { display: flex; flex-direction: column; gap: 8px; }
    .input-row { display: flex; gap: 6px; }
    .input-field { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; font-size: 13px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; transition: border-color .2s; outline: none; }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text3); }
    .btn { padding: 9px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-primary:hover { background: #79b8ff; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .quick-btn { font-size: 11px; padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; transition: all .15s; }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
    .result-scroll { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .result-scroll::-webkit-scrollbar { width: 4px; }
    .result-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text3); text-align: center; }
    .empty-state .icon { font-size: 36px; opacity: .4; }
    .empty-state p { font-size: 13px; line-height: 1.6; }
    .land-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
    .land-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent2); border-radius:3px 0 0 3px; }
    .land-card:hover { border-color: var(--accent); transform: translateX(2px); }
    .land-card.active { border-color: var(--accent); background: rgba(88,166,255,.05); }
    .card-addr { font-size: 13px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
    .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: 10px; color: var(--text3); text-transform: uppercase; }
    .meta-value { font-size: 13px; font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--accent); }
    .meta-value.area { color: var(--accent2); }
    .meta-value.type { color: var(--accent3); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; }
    .status-bar { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); min-height: 36px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .status-dot.loading { background: var(--accent3); animation: pulse 1s infinite; }
    .status-dot.ok { background: var(--accent2); }
    .status-dot.err { background: var(--danger); }
    #map { width: 100%; height: 100%; }
    .map-wrap { position: relative; overflow: hidden; }
    .map-overlay { position: absolute; top: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; min-width: 250px; max-width: 300px; box-shadow: var(--shadow); z-index: 1000; display: none; }
    .map-overlay.visible { display: block; }
    .overlay-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .overlay-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 12px; padding: 4px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .overlay-row:last-child { border-bottom: none; }
    .overlay-key { color: var(--text2); flex-shrink: 0; }
    .overlay-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text); text-align: right; word-break: break-all; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .notice-box { background: rgba(240,136,62,.08); border: 1px solid rgba(240,136,62,.3); border-radius: 8px; padding: 10px 12px; font-size: 11px; color: var(--accent3); line-height: 1.6; margin-top: 8px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><span class="dot"></span>토지 대지면적 조회</div>
    <span class="badge">VWorld API 2.0</span>
    <div class="spacer"></div>
    <span class="hint">지번 주소 검색 또는 지도 클릭</span>
  </header>

  <aside class="panel">
    <div class="panel-section">
      <div class="section-label">주소 검색</div>
      <div class="search-wrap">
        <div class="input-row">
          <input class="input-field" id="addrInput" placeholder="예) 경기도 성남시 중원구 성남동 2882" />
        </div>
        <div class="input-row">
          <button class="btn btn-primary" id="searchBtn" onclick="searchAddress()">검색</button>
          <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
        </div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="quickSearch('경기도 성남시 중원구 성남동 2882')">성남동 2882</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 강남구 역삼동 737')">역삼동 737</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 종로구 세종로 1')">세종로 1</button>
        </div>
      </div>
    </div>

    <div class="section-label" style="padding:12px 16px 0">조회 결과</div>
    <div class="result-scroll" id="resultList">
      <div class="empty-state">
        <div class="icon">🗺️</div>
        <p>주소를 검색하면<br>토지 정보가 표시됩니다</p>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusMsg">준비됨</span>
    </div>
  </aside>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-overlay" id="mapOverlay">
      <div class="overlay-title" id="overlayTitle">토지 정보</div>
      <div id="overlayContent"></div>
    </div>
  </div>
</div>

<script>
// ── 설정 ──────────────────────────────────────
const API_KEY  = '4E0AD412-BC5D-3976-8220-FD7C550431CE';
const GEO_URL  = 'https://api.vworld.kr/req/address';
const LAND_URL = 'https://api.vworld.kr/ned/data/ladfrlList';

let map, currentMarkers = [];
let cbIndex = 0; // JSONP 콜백 인덱스

// ── JSONP 공통 함수 ──────────────────────────
function jsonp(url, params) {
  return new Promise((resolve, reject) => {
    const cbName = '__vwCb' + (cbIndex++);
    params.callback = cbName;
    const query = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    const fullUrl = `${url}?${query}`;

    const script = document.createElement('script');
    script.src = fullUrl;

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 8000);

    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.onerror = () => { cleanup(); reject(new Error('JSONP 스크립트 로드 실패')); };
    document.head.appendChild(script);
  });
}

// ── 지도 초기화 ──────────────────────────────
function initMap() {
  map = new vw.Map("map", {
    basemap: vw.ol.layer.BasemapType.GRAPHIC,
    lon: 127.1429, lat: 37.4342, zoom: 15
  });
  map.on('click', function(e) {
    const coord = vw.ol.proj.transform(e.coordinate, 'EPSG:3857', 'EPSG:4326');
    reverseGeocode(coord[0], coord[1]);
  });
}
function vworldLoad() { initMap(); }

// ── 주소 검색 (지오코더 JSONP) ───────────────
async function searchAddress() {
  const addr = document.getElementById('addrInput').value.trim();
  if (!addr) { setStatus('주소를 입력해주세요', 'err'); return; }

  setStatus('주소 변환 중...', 'loading');
  setSearchBtn(true);

  try {
    const data = await jsonp(GEO_URL, {
      service: 'address',
      request: 'getcoord',
      key: API_KEY,
      address: addr,
      type: 'PARCEL',
      format: 'json',
      errorFormat: 'json',
      verbose: 'true'
    });

    if (data.response?.status !== 'OK') {
      setStatus('주소를 찾을 수 없습니다', 'err');
      showNotFound(addr);
      return;
    }

    const pt      = data.response.result.point;
    const pnu     = data.response.refined?.structure?.level4LC || '';
    const lon     = parseFloat(pt.x);
    const lat     = parseFloat(pt.y);

    setStatus('토지 정보 조회 중...', 'loading');
    await fetchLandInfo(lon, lat, pnu, addr);

  } catch(e) {
    setStatus('오류: ' + e.message, 'err');
    console.error(e);
  } finally {
    setSearchBtn(false);
  }
}

// ── 역지오코딩 (지도 클릭) ───────────────────
async function reverseGeocode(lon, lat) {
  setStatus('클릭 위치 조회 중...', 'loading');
  try {
    const data = await jsonp(GEO_URL, {
      service: 'address',
      request: 'getAddress',
      key: API_KEY,
      point: `${lon},${lat}`,
      type: 'PARCEL',
      format: 'json',
      errorFormat: 'json'
    });

    if (data.response?.status !== 'OK') {
      setStatus('해당 위치 주소를 찾을 수 없습니다', 'err');
      return;
    }

    const result = Array.isArray(data.response.result)
      ? data.response.result[0]
      : data.response.result;

    if (!result) { setStatus('주소 정보 없음', 'err'); return; }

    const addr = result.text || '';
    const pnu  = result.structure?.level4LC || '';
    document.getElementById('addrInput').value = addr;
    await fetchLandInfo(lon, lat, pnu, addr);

  } catch(e) {
    setStatus('역지오코딩 오류: ' + e.message, 'err');
  }
}

// ── 토지임야정보 조회 (JSONP) ────────────────
async function fetchLandInfo(lon, lat, pnu, addr) {
  try {
    const params = {
      key: API_KEY,
      domain: 'https://cune54-bit.github.io',
      format: 'json',
      numOfRows: '5',
      pageNo: '1'
    };

    if (pnu && pnu.length >= 19) {
      params.pnu = pnu;
    } else {
      params.x   = String(lon);
      params.y   = String(lat);
      params.crs = 'EPSG:4326';
    }

    const data = await jsonp(LAND_URL, params);

    if (data?.ladfrlList?.field) {
      const fields = Array.isArray(data.ladfrlList.field)
        ? data.ladfrlList.field
        : [data.ladfrlList.field];
      showResults(fields, lon, lat);
      addMarker(lon, lat, fields[0]);
    } else {
      showGeoOnly(lon, lat, addr, pnu);
      addMarkerSimple(lon, lat);
    }
    moveMap(lon, lat);

  } catch(e) {
    // 토지임야정보 실패해도 지오코더 결과는 표시
    showGeoOnly(lon, lat, addr, pnu);
    addMarkerSimple(lon, lat);
    moveMap(lon, lat);
    setStatus('위치는 표시됨 (토지 상세정보 조회 실패)', 'err');
    console.warn('토지임야정보 오류:', e);
  }
}

// ── 결과 표시 ────────────────────────────────
function showResults(fields, lon, lat) {
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  fields.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'land-card';
    card.onclick = () => {
      document.querySelectorAll('.land-card').forEach((c,j) => c.classList.toggle('active', j===i));
      showOverlayField(f);
    };
    const area  = f.lndpclAr   ? Number(f.lndpclAr).toLocaleString() + ' ㎡' : '-';
    const type  = f.lndcgrCdNm  || '-';
    const zone  = f.prposArea1  || '-';
    const price = f.pblntfPclnd ? Number(f.pblntfPclnd).toLocaleString() + ' 원/㎡' : '-';
    const addr  = f.lnbrAdres   || '-';
    card.innerHTML = `
      <div class="card-addr">${addr}</div>
      <div class="card-meta">
        <div class="meta-item"><span class="meta-label">대지면적</span><span class="meta-value area">${area}</span></div>
        <div class="meta-item"><span class="meta-label">지목</span><span class="meta-value type">${type}</span></div>
        <div class="meta-item"><span class="meta-label">용도지역</span><span class="meta-value type" style="font-size:11px">${zone.length>14?zone.substring(0,14)+'…':zone}</span></div>
        <div class="meta-item"><span class="meta-label">공시지가</span><span class="meta-value" style="font-size:11px">${price}</span></div>
      </div>`;
    list.appendChild(card);
  });
  document.querySelectorAll('.land-card')[0]?.classList.add('active');
  showOverlayField(fields[0]);
  setStatus(`${fields.length}건 조회됨`, 'ok');
}

function showGeoOnly(lon, lat, addr, pnu) {
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'land-card active';
  card.innerHTML = `
    <div class="card-addr">${addr || '주소 정보 없음'}</div>
    <div class="card-meta">
      <div class="meta-item"><span class="meta-label">경도</span><span class="meta-value">${lon.toFixed(5)}</span></div>
      <div class="meta-item"><span class="meta-label">위도</span><span class="meta-value">${lat.toFixed(5)}</span></div>
      <div class="meta-item" style="grid-column:1/-1"><span class="meta-label">PNU</span><span class="meta-value" style="font-size:11px">${pnu||'-'}</span></div>
    </div>
    <div class="notice-box">⚠️ 토지임야정보 API는 브이월드에서 도메인 승인 후 이용 가능합니다.<br>vworld.kr → 마이페이지 → API키 관리 → 도메인 등록</div>`;
  list.appendChild(card);
  showOverlayGeo(lon, lat, addr);
  setStatus('위치 표시됨 (토지 상세 데이터 없음)', 'err');
}

function showNotFound(addr) {
  const list = document.getElementById('resultList');
  list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>"${addr}"<br>검색 결과 없음</p></div>`;
}

// ── 오버레이 ──────────────────────────────────
function showOverlayField(f) {
  const rows = [
    ['대지면적', f.lndpclAr   ? Number(f.lndpclAr).toLocaleString()+' ㎡' : '-'],
    ['지목',    f.lndcgrCdNm  || '-'],
    ['용도지역', f.prposArea1  || '-'],
    ['공시지가', f.pblntfPclnd ? Number(f.pblntfPclnd).toLocaleString()+' 원/㎡' : '-'],
    ['소유구분', f.ownshipChgCause || '-'],
  ].filter(([,v]) => v !== '-');

  document.getElementById('overlayTitle').textContent =
    (f.lnbrAdres||'토지 정보').split(' ').slice(-2).join(' ');
  document.getElementById('overlayContent').innerHTML =
    rows.map(([k,v]) =>
      `<div class="overlay-row"><span class="overlay-key">${k}</span><span class="overlay-val">${v}</span></div>`
    ).join('');
  document.getElementById('mapOverlay').classList.add('visible');
}

function showOverlayGeo(lon, lat, addr) {
  document.getElementById('overlayTitle').textContent =
    (addr||'').split(' ').slice(-2).join(' ') || '위치 정보';
  document.getElementById('overlayContent').innerHTML = `
    <div class="overlay-row"><span class="overlay-key">경도</span><span class="overlay-val">${lon.toFixed(6)}</span></div>
    <div class="overlay-row"><span class="overlay-key">위도</span><span class="overlay-val">${lat.toFixed(6)}</span></div>`;
  document.getElementById('mapOverlay').classList.add('visible');
}

// ── 마커 ──────────────────────────────────────
function markerSVG(label) {
  const safe = (label||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
    <circle cx="32" cy="24" r="20" fill="#58a6ff" opacity="0.15"/>
    <circle cx="32" cy="24" r="12" fill="#58a6ff"/>
    <circle cx="32" cy="24" r="5"  fill="white"/>
    <polygon points="32,50 25,34 39,34" fill="#58a6ff"/>
    <text x="32" y="62" text-anchor="middle" font-size="8" fill="#58a6ff" font-family="sans-serif">${safe}</text>
  </svg>`;
}

function addMarker(lon, lat, field) {
  clearMarkers();
  const label = field?.lndpclAr ? `${Number(field.lndpclAr).toLocaleString()}㎡` : '위치';
  _addMarker(lon, lat, label);
}
function addMarkerSimple(lon, lat) {
  clearMarkers();
  _addMarker(lon, lat, '위치');
}
function _addMarker(lon, lat, label) {
  try {
    const m = new vw.Marker(new vw.CoordEPSG4326(lon, lat), {
      iconUrl: `data:image/svg+xml,${encodeURIComponent(markerSVG(label))}`,
      iconSize: [64, 64], iconAnchor: [32, 64]
    });
    map.addMarker(m);
    currentMarkers.push(m);
  } catch(e) { console.warn('마커 추가 실패', e); }
}
function clearMarkers() {
  currentMarkers.forEach(m => { try { map.removeMarker(m); } catch(e){} });
  currentMarkers = [];
}
function moveMap(lon, lat) {
  try { map.setCenter(new vw.CoordEPSG4326(lon, lat)); map.setZoom(18); } catch(e){}
}

// ── 유틸 ──────────────────────────────────────
function quickSearch(addr) {
  document.getElementById('addrInput').value = addr;
  searchAddress();
}
function clearAll() {
  document.getElementById('addrInput').value = '';
  document.getElementById('resultList').innerHTML =
    `<div class="empty-state"><div class="icon">🗺️</div><p>주소를 검색하면<br>토지 정보가 표시됩니다</p></div>`;
  document.getElementById('mapOverlay').classList.remove('visible');
  clearMarkers();
  setStatus('초기화됨', '');
}
function setStatus(msg, type) {
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('statusDot').className = 'status-dot' + (type ? ' '+type : '');
}
function setSearchBtn(disabled) {
  const btn = document.getElementById('searchBtn');
  btn.disabled = disabled;
  btn.innerHTML = disabled ? '<span class="spinner"></span> 조회 중' : '검색';
}
document.getElementById('addrInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchAddress();
});
</script>
</body>
