<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>토지 대지면적 조회 지도</title>
  <script type="text/javascript" src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=4E0AD412-BC5D-3976-8220-FD7C550431CE"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --accent3: #f0883e;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #484f58;
      --danger: #f85149;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 10px;
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── 레이아웃 ── */
    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 360px 1fr;
      height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.3px;
    }
    header .logo .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    header .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
    }
    header .spacer { flex: 1; }
    header .hint {
      font-size: 12px;
      color: var(--text3);
    }

    /* ── 사이드패널 ── */
    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    /* 검색박스 */
    .search-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-row {
      display: flex;
      gap: 6px;
    }
    .input-field {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      font-size: 13px;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text3); }

    .btn {
      padding: 9px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d1117;
    }
    .btn-primary:hover { background: #79b8ff; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .quick-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .quick-btn {
      font-size: 11px;
      padding: 4px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* 결과 카드 */
    .result-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result-scroll::-webkit-scrollbar { width: 4px; }
    .result-scroll::-webkit-scrollbar-track { background: transparent; }
    .result-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text3);
      text-align: center;
    }
    .empty-state .icon { font-size: 36px; opacity: 0.4; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    .land-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .land-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent2);
      border-radius: 3px 0 0 3px;
    }
    .land-card:hover { border-color: var(--accent); transform: translateX(2px); }
    .land-card.active { border-color: var(--accent); background: rgba(88,166,255,0.05); }

    .card-addr {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .meta-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .meta-value {
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--accent);
    }
    .meta-value.area { color: var(--accent2); }
    .meta-value.type { color: var(--accent3); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; }

    /* 상태 바 */
    .status-bar {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text3);
      min-height: 36px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
    }
    .status-dot.loading { background: var(--accent3); animation: pulse 1s infinite; }
    .status-dot.ok { background: var(--accent2); }
    .status-dot.err { background: var(--danger); }

    /* ── 지도 ── */
    #map {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* 지도 위 오버레이 정보창 */
    .map-overlay {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      min-width: 240px;
      pointer-events: none;
      box-shadow: var(--shadow);
      z-index: 1000;
      display: none;
    }
    .map-overlay.visible { display: block; }
    .overlay-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .overlay-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .overlay-row:last-child { border-bottom: none; }
    .overlay-key { color: var(--text2); }
    .overlay-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text); }

    /* 로딩 스피너 */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 마커 커스텀 팝업 */
    .custom-popup {
      background: var(--surface) !important;
      border: 1px solid var(--accent) !important;
      border-radius: var(--radius) !important;
      color: var(--text) !important;
      font-family: 'Noto Sans KR', sans-serif !important;
      font-size: 12px !important;
      box-shadow: var(--shadow) !important;
      padding: 10px 14px !important;
      min-width: 200px;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <header>
    <div class="logo">
      <span class="dot"></span>
      토지 대지면적 조회
    </div>
    <span class="badge">VWorld API 2.0</span>
    <div class="spacer"></div>
    <span class="hint">지번 주소로 검색하거나 지도를 클릭하세요</span>
  </header>

  <!-- 사이드패널 -->
  <aside class="panel">

    <!-- 검색 섹션 -->
    <div class="panel-section">
      <div class="section-label">주소 검색</div>
      <div class="search-wrap">
        <div class="input-row">
          <input class="input-field" id="addrInput" placeholder="예) 경기도 성남시 중원구 성남동 2882" />
        </div>
        <div class="input-row">
          <button class="btn btn-primary" id="searchBtn" onclick="searchAddress()">검색</button>
          <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
        </div>
        <div class="quick-btns">
          <span class="section-label" style="margin:0;align-self:center">바로가기</span>
          <button class="quick-btn" onclick="quickSearch('경기도 성남시 중원구 성남동 2882')">성남동 2882</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 강남구 역삼동 737')">역삼동 737</button>
          <button class="quick-btn" onclick="quickSearch('서울특별시 종로구 세종로 1')">세종로 1</button>
        </div>
      </div>
    </div>

    <!-- 결과 목록 -->
    <div class="section-label" style="padding:12px 16px 0">조회 결과</div>
    <div class="result-scroll" id="resultList">
      <div class="empty-state">
        <div class="icon">🗺️</div>
        <p>주소를 검색하면<br>토지 대지면적 정보가<br>여기에 표시됩니다</p>
      </div>
    </div>

    <!-- 상태바 -->
    <div class="status-bar" id="statusBar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusMsg">준비됨</span>
    </div>
  </aside>

  <!-- 지도 -->
  <div style="position:relative; overflow:hidden;">
    <div id="map"></div>
    <div class="map-overlay" id="mapOverlay">
      <div class="overlay-title" id="overlayTitle">토지 정보</div>
      <div id="overlayContent"></div>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// 설정
// ─────────────────────────────────────────────
const API_KEY    = '4E0AD412-BC5D-3976-8220-FD7C550431CE';
const LAND_API   = 'https://api.vworld.kr/ned/data/ladfrlList';
const GEO_API    = 'https://api.vworld.kr/req/address';

let map, currentMarkers = [], currentPolygons = [], resultData = [];

// ─────────────────────────────────────────────
// 지도 초기화
// ─────────────────────────────────────────────
function initMap() {
  map = new vw.Map("map", {
    basemap: vw.ol.layer.BasemapType.GRAPHIC,
    lon: 127.1429,
    lat: 37.4342,
    zoom: 17
  });

  // 지도 클릭 → 좌표로 토지 조회
  map.on('click', function(e) {
    const coord = vw.ol.proj.transform(e.coordinate, 'EPSG:3857', 'EPSG:4326');
    reverseGeocode(coord[0], coord[1]);
  });
}

// vworld 로드 완료 후 초기화
function vworldLoad() { initMap(); }

// ─────────────────────────────────────────────
// 주소 → 좌표 변환 (지오코더)
// ─────────────────────────────────────────────
async function searchAddress() {
  const addr = document.getElementById('addrInput').value.trim();
  if (!addr) { setStatus('주소를 입력해주세요', 'err'); return; }

  setStatus('주소 변환 중...', 'loading');
  setSearchBtn(true);

  try {
    const url = `${GEO_API}?service=address&request=getcoord`
      + `&key=${API_KEY}`
      + `&address=${encodeURIComponent(addr)}`
      + `&type=PARCEL&format=json&errorFormat=json&verbose=true`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.response?.status !== 'OK') {
      setStatus('주소를 찾을 수 없습니다', 'err');
      setSearchBtn(false);
      return;
    }

    const pt = data.response.result.point;
    const refined = data.response.refined;
    const pnu = refined?.structure?.level4LC || '';

    setStatus('토지 정보 조회 중...', 'loading');
    await fetchLandInfo(parseFloat(pt.x), parseFloat(pt.y), pnu, addr);

  } catch(e) {
    setStatus('오류: ' + e.message, 'err');
  } finally {
    setSearchBtn(false);
  }
}

// ─────────────────────────────────────────────
// 좌표 → 주소 역지오코딩 (지도 클릭)
// ─────────────────────────────────────────────
async function reverseGeocode(lon, lat) {
  setStatus('클릭 위치 조회 중...', 'loading');
  try {
    const url = `${GEO_API}?service=address&request=getAddress`
      + `&key=${API_KEY}`
      + `&point=${lon},${lat}`
      + `&type=PARCEL&format=json&errorFormat=json`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.response?.status !== 'OK') {
      setStatus('해당 위치의 주소를 찾을 수 없습니다', 'err');
      return;
    }

    const result = data.response.result?.[0];
    if (!result) { setStatus('주소 정보 없음', 'err'); return; }

    const addr = result.text || '';
    const pnu  = result.structure?.level4LC || '';
    document.getElementById('addrInput').value = addr;
    await fetchLandInfo(lon, lat, pnu, addr);

  } catch(e) {
    setStatus('오류: ' + e.message, 'err');
  }
}

// ─────────────────────────────────────────────
// 토지임야정보 API 호출
// ─────────────────────────────────────────────
async function fetchLandInfo(lon, lat, pnu, addr) {
  try {
    // PNU에서 지번 파라미터 파싱
    // PNU 구조: 시군구(5)+법정동(5)+산여부(1)+본번(4)+부번(4)
    let params = { key: API_KEY, domain: window.location.origin || 'http://localhost', format: 'json', numOfRows: 5, pageNo: 1 };

    if (pnu && pnu.length >= 19) {
      params.pnu = pnu;
    } else {
      // PNU 없으면 좌표로 시도
      params.x = lon;
      params.y = lat;
      params.crs = 'EPSG:4326';
    }

    const query = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    const url = `${LAND_API}?${query}`;

    const res = await fetch(url);
    const text = await res.text();

    let data;
    try { data = JSON.parse(text); }
    catch { data = null; }

    if (data?.ladfrlList?.field) {
      // 정상 응답
      const fields = Array.isArray(data.ladfrlList.field)
        ? data.ladfrlList.field
        : [data.ladfrlList.field];
      showResults(fields, lon, lat);
      addMarker(lon, lat, fields[0]);
    } else {
      // API 응답 없으면 지오코더 정보로 표시
      showFallback(lon, lat, addr, pnu);
      addMarkerSimple(lon, lat, addr);
    }

    moveMap(lon, lat);

  } catch(e) {
    showFallback(lon, lat, addr, pnu);
    addMarkerSimple(lon, lat, addr);
    moveMap(lon, lat);
    setStatus('토지 상세정보 조회 실패 (기본 정보 표시)', 'err');
  }
}

// ─────────────────────────────────────────────
// 결과 표시
// ─────────────────────────────────────────────
function showResults(fields, lon, lat) {
  resultData = fields;
  const list = document.getElementById('resultList');
  list.innerHTML = '';

  fields.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'land-card';
    card.onclick = () => selectCard(i, lon, lat);

    const area     = f.lndpclAr   || f.area     || '-';
    const useZone  = f.prposArea1  || f.useArea  || '-';
    const landType = f.lndcgrCdNm  || f.category || '-';
    const officialPrice = f.pblntfPclnd || '-';
    const addrText = f.lnbrAdres   || f.address  || '-';

    card.innerHTML = `
      <div class="card-addr">${addrText}</div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-label">대지면적</span>
          <span class="meta-value area">${area !== '-' ? Number(area).toLocaleString() + ' ㎡' : '-'}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">지목</span>
          <span class="meta-value type">${landType}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">용도지역</span>
          <span class="meta-value type" style="font-size:11px">${useZone !== '-' ? useZone.substring(0,12) : '-'}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">공시지가</span>
          <span class="meta-value" style="font-size:11px">${officialPrice !== '-' ? Number(officialPrice).toLocaleString() + ' 원/㎡' : '-'}</span>
        </div>
      </div>`;
    list.appendChild(card);
  });

  selectCard(0, lon, lat);
  setStatus(`${fields.length}건 조회됨`, 'ok');
}

function showFallback(lon, lat, addr, pnu) {
  resultData = [];
  const list = document.getElementById('resultList');
  list.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'land-card active';
  card.innerHTML = `
    <div class="card-addr">${addr || '주소 정보 없음'}</div>
    <div class="card-meta">
      <div class="meta-item">
        <span class="meta-label">좌표 (경도)</span>
        <span class="meta-value">${lon.toFixed(6)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">좌표 (위도)</span>
        <span class="meta-value">${lat.toFixed(6)}</span>
      </div>
      <div class="meta-item" style="grid-column:1/-1">
        <span class="meta-label">PNU 코드</span>
        <span class="meta-value" style="font-size:11px">${pnu || '-'}</span>
      </div>
    </div>
    <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)">
      ⚠️ 토지임야정보 API는 도메인 등록된 서버에서만 전체 데이터가 제공됩니다.<br>
      대지면적은 공공데이터포털 건축물대장 API를 통해 추가 조회하세요.
    </div>`;
  list.appendChild(card);

  showOverlay(lon, lat, { addr, pnu, lon, lat });
  setStatus('기본 위치 정보 표시 중', 'ok');
}

function selectCard(idx, lon, lat) {
  document.querySelectorAll('.land-card').forEach((c,i) => {
    c.classList.toggle('active', i === idx);
  });
  if (resultData[idx]) {
    showOverlay(lon, lat, resultData[idx]);
  }
}

// ─────────────────────────────────────────────
// 지도 마커 & 오버레이
// ─────────────────────────────────────────────
function addMarker(lon, lat, field) {
  clearMarkers();
  const area = field?.lndpclAr || field?.area || '';
  const label = area ? `${Number(area).toLocaleString()}㎡` : '위치';

  const marker = new vw.Marker(
    new vw.CoordEPSG4326(lon, lat),
    {
      iconUrl: `data:image/svg+xml,${encodeURIComponent(markerSVG(label))}`,
      iconSize: [60, 60],
      iconAnchor: [30, 60]
    }
  );
  map.addMarker(marker);
  currentMarkers.push(marker);
}

function addMarkerSimple(lon, lat, addr) {
  clearMarkers();
  const label = addr ? addr.split(' ').slice(-1)[0] : '위치';
  const marker = new vw.Marker(
    new vw.CoordEPSG4326(lon, lat),
    {
      iconUrl: `data:image/svg+xml,${encodeURIComponent(markerSVG(label))}`,
      iconSize: [60, 60],
      iconAnchor: [30, 60]
    }
  );
  map.addMarker(marker);
  currentMarkers.push(marker);
}

function markerSVG(label) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
    <circle cx="30" cy="24" r="18" fill="#58a6ff" opacity="0.2"/>
    <circle cx="30" cy="24" r="10" fill="#58a6ff"/>
    <circle cx="30" cy="24" r="5" fill="white"/>
    <polygon points="30,48 23,32 37,32" fill="#58a6ff"/>
    <text x="30" y="58" text-anchor="middle" font-size="8" fill="#58a6ff" font-family="sans-serif">${label}</text>
  </svg>`;
}

function clearMarkers() {
  currentMarkers.forEach(m => { try { map.removeMarker(m); } catch(e){} });
  currentMarkers = [];
}

function moveMap(lon, lat) {
  map.setCenter(new vw.CoordEPSG4326(lon, lat));
  map.setZoom(18);
}

// ─────────────────────────────────────────────
// 지도 위 오버레이 정보창
// ─────────────────────────────────────────────
function showOverlay(lon, lat, data) {
  const overlay  = document.getElementById('mapOverlay');
  const content  = document.getElementById('overlayContent');
  const title    = document.getElementById('overlayTitle');

  if (data.lnbrAdres || data.address) {
    // 토지임야정보 정상 응답
    const rows = [
      ['대지면적', data.lndpclAr ? `${Number(data.lndpclAr).toLocaleString()} ㎡` : '-'],
      ['지목',    data.lndcgrCdNm || '-'],
      ['용도지역', data.prposArea1 || '-'],
      ['공시지가', data.pblntfPclnd ? `${Number(data.pblntfPclnd).toLocaleString()} 원/㎡` : '-'],
      ['소유구분', data.ownshipChgCause || '-'],
    ].filter(([,v]) => v !== '-');

    title.textContent = (data.lnbrAdres || data.address || '토지 정보').split(' ').slice(-3).join(' ');
    content.innerHTML = rows.map(([k,v]) =>
      `<div class="overlay-row"><span class="overlay-key">${k}</span><span class="overlay-val">${v}</span></div>`
    ).join('');
  } else {
    // 폴백
    title.textContent = '위치 정보';
    content.innerHTML = `
      <div class="overlay-row"><span class="overlay-key">주소</span><span class="overlay-val" style="font-size:11px">${(data.addr||'').split(' ').slice(-3).join(' ')}</span></div>
      <div class="overlay-row"><span class="overlay-key">경도</span><span class="overlay-val">${Number(lon).toFixed(5)}</span></div>
      <div class="overlay-row"><span class="overlay-key">위도</span><span class="overlay-val">${Number(lat).toFixed(5)}</span></div>`;
  }

  overlay.style.top  = '16px';
  overlay.style.right = '16px';
  overlay.classList.add('visible');
}

// ─────────────────────────────────────────────
// 유틸
// ─────────────────────────────────────────────
function quickSearch(addr) {
  document.getElementById('addrInput').value = addr;
  searchAddress();
}

function clearAll() {
  document.getElementById('addrInput').value = '';
  document.getElementById('resultList').innerHTML = `
    <div class="empty-state">
      <div class="icon">🗺️</div>
      <p>주소를 검색하면<br>토지 대지면적 정보가<br>여기에 표시됩니다</p>
    </div>`;
  document.getElementById('mapOverlay').classList.remove('visible');
  clearMarkers();
  setStatus('초기화됨', '');
}

function setStatus(msg, type) {
  document.getElementById('statusMsg').textContent = msg;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
}

function setSearchBtn(disabled) {
  const btn = document.getElementById('searchBtn');
  btn.disabled = disabled;
  btn.innerHTML = disabled
    ? '<span class="spinner"></span> 조회 중'
    : '검색';
}

// Enter 키로 검색
document.getElementById('addrInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchAddress();
});
</script>
